<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }

    .signup-container {
      max-width: 440px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .signup-card {
      background: white;
      border-radius: 40px;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      animation: fadeInUp 0.6s ease-out;
    }

    .signup-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #10b981, #059669, #10b981);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.8rem;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .logo-icon i {
      font-size: 28px;
      color: white;
    }

    .logo h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logo p {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .welcome-text h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .welcome-text p {
      color: #64748b;
      font-size: 0.8rem;
    }

    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .password-strength {
      margin-top: 0.4rem;
      display: flex;
      gap: 0.25rem;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: #e2e8f0;
      border-radius: 2px;
    }

    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #10b981; }

    .signup-btn {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .signup-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .divider {
      text-align: center;
      margin: 1.2rem 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span {
      background: white;
      padding: 0 12px;
      position: relative;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .login-link {
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
    }

    .login-link a {
      color: #10b981;
      text-decoration: none;
      font-weight: 600;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.6rem;
      border-radius: 14px;
      font-size: 0.75rem;
      text-align: center;
      margin-bottom: 1rem;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
    }

    @media (max-width: 480px) {
      .signup-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="bg-circle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="bg-circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>
    <div class="bg-circle" style="width: 150px; height: 150px; top: 50%; left: 85%;"></div>
  </div>

  <div class="signup-container">
    <div class="signup-card">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-tasks"></i></div>
        <h1>TaskPay</h1>
        <p>Start earning today</p>
      </div>

      <div class="welcome-text">
        <h2>Create account ✨</h2>
        <p>Join thousands of users earning real money</p>
      </div>

      <div id="errorMsg" class="error-message"></div>

      <form id="signupForm">
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" class="input-field" id="fullName" placeholder="Full Name">
        </div>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="input-field" id="email" placeholder="Email Address">
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="input-field" id="password" placeholder="Password">
        </div>
        <div class="password-strength" id="strengthBars">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>

        <button type="submit" class="signup-btn" id="signupBtn">
          <span>Create Account</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="divider"><span>or</span></div>

      <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';

    const signupForm = document.getElementById('signupForm');
    const errorMsg = document.getElementById('errorMsg');
    const signupBtn = document.getElementById('signupBtn');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Password strength
    document.getElementById('password').addEventListener('input', function(e) {
      const password = e.target.value;
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      strength = Math.min(strength, 3);
      
      const bars = document.querySelectorAll('#strengthBars .strength-bar');
      bars.forEach((bar, idx) => {
        bar.classList.remove('weak', 'medium', 'strong');
        if (idx < strength) {
          if (strength === 1) bar.classList.add('weak');
          else if (strength === 2) bar.classList.add('medium');
          else if (strength >= 3) bar.classList.add('strong');
        }
      });
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!fullName) { showError('Please enter your full name'); return; }
      if (!email) { showError('Please enter your email'); return; }
      if (!password) { showError('Please enter a password'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
      
      signupBtn.disabled = true;
      signupBtn.innerHTML = '<span>Creating account...</span><i class="fas fa-spinner fa-pulse"></i>';
      
      try {
        // Sign up with Supabase
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });
        
        if (error) throw error;
        
        if (data.user) {
          showToast('Account created successfully! Redirecting to login...');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        }
      } catch (err) {
        showError(err.message || 'Signup failed. Please try again.');
        signupBtn.disabled = false;
        signupBtn.innerHTML = '<span>Create Account</span><i class="fas fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
