<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .signup-container {
      max-width: 450px;
      width: 100%;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signup-card {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .logo-icon i {
      font-size: 28px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .form-input.error {
      border-color: #dc2626;
    }

    .btn-signup {
      width: 100%;
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1rem;
    }

    .btn-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .btn-signup:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .password-match-hint {
      font-size: 0.7rem;
      margin-top: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .match-success {
      color: #10b981;
    }

    .match-error {
      color: #dc2626;
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }

    .login-link a {
      color: #059669;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .signup-card {
        padding: 1.5rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      
      <h2>Create Account</h2>
      <p class="subtitle">Start earning money today</p>
      
      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>
      
      <form id="signupForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="fullName" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Create a password" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your password" required>
          <div class="password-match-hint" id="passwordMatchHint"></div>
        </div>
        
        <button type="submit" class="btn-signup" id="signupBtn">Create Account</button>
      </form>
      
      <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';
    
    const signupForm = document.getElementById('signupForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const passwordMatchHint = document.getElementById('passwordMatchHint');
    const signupBtn = document.getElementById('signupBtn');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
      
      setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 4000);
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }

    // Real-time password match validation
    function checkPasswordMatch() {
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      
      if (confirm.length === 0) {
        passwordMatchHint.innerHTML = '';
        confirmInput.classList.remove('error');
        return;
      }
      
      if (password === confirm) {
        passwordMatchHint.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
        passwordMatchHint.className = 'password-match-hint match-success';
        confirmInput.classList.remove('error');
      } else {
        passwordMatchHint.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
        passwordMatchHint.className = 'password-match-hint match-error';
        confirmInput.classList.add('error');
      }
    }

    passwordInput.addEventListener('input', checkPasswordMatch);
    confirmInput.addEventListener('input', checkPasswordMatch);

    signupForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;
      
      // Validation
      if (!fullName) {
        showError('Please enter your full name');
        return;
      }
      
      if (!email) {
        showError('Please enter your email address');
        return;
      }
      
      if (!password) {
        showError('Please create a password');
        return;
      }
      
      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }
      
      // Show loading state
      const originalText = signupBtn.innerHTML;
      signupBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating account...';
      signupBtn.disabled = true;
      hideMessages();
      
      try {
        // Sign up with Supabase
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });
        
        if (error) throw error;
        
        if (data.user) {
          showSuccess('Account created successfully! Redirecting to home page...');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        }
      } catch (err) {
        console.log('Supabase error:', err.message);
        
        // Fallback: Store in localStorage
        const users = JSON.parse(localStorage.getItem('taskpay_users') || '[]');
        const existingUser = users.find(u => u.email === email);
        
        if (existingUser) {
          showError('An account with this email already exists');
        } else {
          users.push({ fullName, email, password, createdAt: new Date().toISOString() });
          localStorage.setItem('taskpay_users', JSON.stringify(users));
          
          showSuccess('Account created successfully! Redirecting to home page...');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        }
      } finally {
        signupBtn.innerHTML = originalText;
        signupBtn.disabled = false;
      }
    });
    
    // Check if already logged in
    if (localStorage.getItem('taskpay_logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
