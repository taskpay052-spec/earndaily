<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      min-height: 100vh;
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(16, 185, 129, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      color: white;
      font-size: 16px;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: none;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
    }

    /* Main Content */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.85rem;
    }

    /* Stats Summary - Mobile Optimized */
    .stats-summary {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.7rem;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .stats-summary-item .value {
      font-size: 1.2rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters - Horizontal Scroll */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.3rem;
      -webkit-overflow-scrolling: touch;
    }

    .category-filters::-webkit-scrollbar {
      height: 3px;
    }

    .category-filters::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .category-filters::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 10px;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .category-btn i {
      font-size: 0.7rem;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1.5px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #059669;
      border-color: #059669;
      color: white;
    }

    /* Tasks Grid - 2 Cards Per Row on Mobile */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .task-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(16, 185, 129, 0.1);
      transition: all 0.3s;
      cursor: pointer;
    }

    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .task-image {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task-image i {
      font-size: 40px;
      color: white;
    }

    .task-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      color: white;
      font-size: 0.6rem;
      font-weight: 600;
    }

    .category-tag {
      position: absolute;
      bottom: 0.5rem;
      left: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      color: white;
      font-size: 0.55rem;
      font-weight: 500;
    }

    .task-content {
      padding: 0.8rem;
    }

    .task-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: #0f172a;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-description {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.6rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-top: 0.4rem;
      border-top: 1px solid #e2e8f0;
    }

    .task-time {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.6rem;
      color: #94a3b8;
    }

    .task-difficulty {
      display: flex;
      align-items: center;
    }

    .difficulty-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.55rem;
      font-weight: 600;
    }

    .difficulty-easy { background: #d1fae5; color: #065f46; }
    .difficulty-medium { background: #fed7aa; color: #9a3412; }
    .difficulty-hard { background: #fee2e2; color: #dc2626; }

    .task-reward {
      font-weight: 800;
      color: #059669;
      font-size: 0.85rem;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #10b981;
      font-weight: 500;
      font-size: 0.7rem;
    }

    .start-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      grid-column: span 2;
    }

    .empty-state i {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .empty-state h3 {
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .empty-state p {
      font-size: 0.8rem;
      color: #64748b;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .main-container {
        padding: 2rem;
      }
      
      .nav-links {
        display: flex;
      }
      
      .tasks-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem;
      }
      
      .task-image {
        height: 120px;
      }
      
      .task-image i {
        font-size: 48px;
      }
      
      .page-header h1 {
        font-size: 2rem;
      }
    }

    @media (min-width: 1024px) {
      .tasks-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="navigateTo('dashboard')">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      <div class="nav-links">
        <a class="nav-link" onclick="navigateTo('dashboard')">Dashboard</a>
        <a class="nav-link active" onclick="navigateTo('tasks')">Tasks</a>
        <a class="nav-link" onclick="navigateTo('surveys')">Surveys</a>
        <a class="nav-link" onclick="navigateTo('withdrawals')">Withdraw</a>
        <a class="nav-link" onclick="navigateTo('profile')">Profile</a>
      </div>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar" onclick="navigateTo('profile')">U</div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="page-header">
      <h1>✨ Premium Tasks</h1>
      <p>Complete tasks & earn real money</p>
    </div>

    <div class="stats-summary">
      <div class="stats-summary-item">
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Earned</div>
        <div class="value" id="tasksEarned">$0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available</div>
        <div class="value" id="availableCount">0</div>
      </div>
    </div>

    <div class="category-filters" id="categoryFilters"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest</button>
    </div>

    <div id="tasksContainer" class="tasks-grid"></div>
  </div>

  <script>
    const allTasks = [
      { id: "task_1", title: "🤖 AI Image Review", description: "Rate AI-generated images", reward: 1.25, timeEstimate: "2 min", category: "ai", icon: "fa-robot", color: "#8b5cf6", difficulty: "medium" },
      { id: "task_2", title: "💬 ChatGPT Testing", description: "Test AI prompts", reward: 1.50, timeEstimate: "3 min", category: "ai", icon: "fa-comment-dots", color: "#a855f7", difficulty: "hard" },
      { id: "task_3", title: "🎙️ Voice Feedback", description: "Test voice commands", reward: 0.90, timeEstimate: "1 min", category: "ai", icon: "fa-microphone-alt", color: "#c084fc", difficulty: "easy" },
      { id: "task_4", title: "🛍️ Product Review", description: "Write review with photo", reward: 1.25, timeEstimate: "3 min", category: "ecommerce", icon: "fa-camera", color: "#f59e0b", difficulty: "medium" },
      { id: "task_5", title: "💰 Price Compare", description: "Compare 3 websites", reward: 0.70, timeEstimate: "2 min", category: "ecommerce", icon: "fa-tags", color: "#f97316", difficulty: "easy" },
      { id: "task_6", title: "📱 TikTok Trends", description: "Analyze trending videos", reward: 0.95, timeEstimate: "2 min", category: "social", icon: "fa-tiktok", color: "#ec489a", difficulty: "medium" },
      { id: "task_7", title: "✍️ Short Story", description: "Write 3-sentence story", reward: 0.85, timeEstimate: "2 min", category: "creative", icon: "fa-feather-alt", color: "#14b8a6", difficulty: "medium" },
      { id: "task_8", title: "📱 App Testing", description: "Test new app features", reward: 2.50, timeEstimate: "5 min", category: "tech", icon: "fa-mobile-alt", color: "#3b82f6", difficulty: "hard" },
      { id: "task_9", title: "📚 Quiz", description: "Complete quiz", reward: 0.70, timeEstimate: "2 min", category: "education", icon: "fa-graduation-cap", color: "#10b981", difficulty: "easy" },
      { id: "task_10", title: "☀️ Daily Check-in", description: "Claim daily reward", reward: 0.15, timeEstimate: "10 sec", category: "daily", icon: "fa-calendar-check", color: "#10b981", difficulty: "easy" },
      { id: "task_11", title: "🎨 Logo Test", description: "Choose preferred logo", reward: 0.60, timeEstimate: "1 min", category: "research", icon: "fa-palette", color: "#f97316", difficulty: "easy" },
      { id: "task_12", title: "🎙️ Voice Record", description: "Record 15-sec clip", reward: 0.80, timeEstimate: "1 min", category: "audio", icon: "fa-microphone", color: "#ec489a", difficulty: "easy" }
    ];

    let tasks = [], currentUser = null, completedTasks = [], currentFilter = 'all', currentCategory = 'all', tasksEarned = 0;

    function navigateTo(page) {
      const pages = { 'dashboard': 'dashboard.html', 'tasks': 'tasks.html', 'surveys': 'surveys.html', 'withdrawals': 'withdrawal.html', 'profile': 'profile.html' };
      window.location.href = pages[page] || '#';
    }

    function checkAuth() {
      if (localStorage.getItem('taskpay_logged_in') !== 'true') { window.location.href = 'login.html'; return false; }
      currentUser = localStorage.getItem('taskpay_user_email') || 'user@taskpay.com';
      loadUserData();
      return true;
    }

    function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completedTasks = JSON.parse(localStorage.getItem(`taskpay_completed_tasks_${userKey}`) || '[]');
      tasksEarned = 0;
      tasks = allTasks.map(t => { const c = completedTasks.includes(t.id); if (c) tasksEarned += t.reward; return { ...t, completed: c }; });
      updateStats();
      renderCategoryFilters();
      renderTasks();
      document.getElementById('userAvatar').textContent = currentUser.split('@')[0].charAt(0).toUpperCase();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
      document.getElementById('availableCount').textContent = tasks.filter(t => !t.completed).length;
      document.getElementById('tasksEarned').textContent = `$${tasksEarned.toFixed(2)}`;
    }

    function renderCategoryFilters() {
      const cats = [
        { id: 'all', name: 'All', icon: 'fa-th-large' }, { id: 'ai', name: '🤖 AI', icon: 'fa-robot' },
        { id: 'ecommerce', name: '🛍️ Shop', icon: 'fa-shopping-cart' }, { id: 'social', name: '📱 Social', icon: 'fa-share-alt' },
        { id: 'creative', name: '🎨 Creative', icon: 'fa-palette' }, { id: 'tech', name: '💻 Tech', icon: 'fa-laptop-code' },
        { id: 'daily', name: '☀️ Daily', icon: 'fa-calendar-day' }
      ];
      document.getElementById('categoryFilters').innerHTML = cats.map(c => `<button class="category-btn ${currentCategory === c.id ? 'active' : ''}" data-category="${c.id}"><i class="fas ${c.icon}"></i><span>${c.name}</span></button>`).join('');
      document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', () => { currentCategory = btn.dataset.category; renderCategoryFilters(); renderTasks(); }));
    }

    function renderTasks() {
      let filtered = tasks.filter(t => currentCategory === 'all' || t.category === currentCategory);
      if (currentFilter === 'available') filtered = filtered.filter(t => !t.completed);
      else if (currentFilter === 'completed') filtered = filtered.filter(t => t.completed);
      else if (currentFilter === 'highest') filtered.sort((a, b) => b.reward - a.reward);
      const container = document.getElementById('tasksContainer');
      if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-tasks"></i><h3>No tasks</h3><p>Check back later!</p></div>`; return; }
      container.innerHTML = filtered.map(t => `<div class="task-card"><div class="task-image" style="background: linear-gradient(135deg, ${t.color}99, ${t.color});"><i class="fas ${t.icon}"></i><span class="task-badge">${t.timeEstimate}</span><span class="category-tag">${t.category.toUpperCase()}</span></div><div class="task-content"><h3 class="task-title">${t.title}</h3><p class="task-description">${t.description}</p><div class="task-meta"><div class="task-time"><i class="fas fa-clock"></i><span>${t.timeEstimate}</span></div><div class="task-difficulty"><span class="difficulty-badge difficulty-${t.difficulty}">${t.difficulty.toUpperCase()}</span></div><div class="task-reward"><i class="fas fa-dollar-sign"></i> ${t.reward.toFixed(2)}</div></div><div class="task-footer">${t.completed ? `<div class="completed-badge"><i class="fas fa-check-circle"></i><span>Completed</span></div>` : `<button class="start-btn" onclick="startTask('${t.id}')"><i class="fas fa-play"></i> Start</button>`}</div></div></div>`).join('');
    }

    function startTask(id) { const task = tasks.find(t => t.id === id); if (task.completed) return showToast('Already completed!'); sessionStorage.setItem('current_task', JSON.stringify(task)); showToast('Loading...'); setTimeout(() => window.location.href = `task-detail.html?id=${id}`, 300); }
    function showToast(m) { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="fas fa-check-circle"></i> ${m}`; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function logout() { if (confirm('Logout?')) { localStorage.removeItem('taskpay_logged_in'); localStorage.removeItem('taskpay_user_email'); window.location.href = 'login.html'; } }

    window.navigateTo = navigateTo; window.startTask = startTask;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderTasks(); }));
    document.getElementById('logoutBtn').addEventListener('click', logout);
    if (checkAuth()) {}
  </script>
</body>
</html>
