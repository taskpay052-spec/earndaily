<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Tasks (60+ Tasks)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Inter', sans-serif;
      color: #1a1f36;
      overflow-x: hidden;
    }

    /* Premium Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      transition: all 0.3s;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }

    .logo-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      color: #94a3b8;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
    }

    .nav-item span {
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .menu-left {
      display: flex;
      align-items: center;
    }

    .menu-toggle {
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .menu-toggle:hover {
      background: #f1f5f9;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notification-bell {
      position: relative;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .notification-bell:hover {
      background: #f1f5f9;
    }

    .notification-bell i {
      font-size: 1.2rem;
      color: #64748b;
    }

    .notification-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-card:hover {
      background: #f1f5f9;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .user-info {
      display: none;
    }

    .user-info h4 {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .user-info p {
      font-size: 0.65rem;
      color: #64748b;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    /* Main Content */
    .main-content {
      margin-left: 0;
      padding: 1rem;
      transition: margin-left 0.3s;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.85rem;
    }

    /* Stats Summary */
    .stats-summary {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.7rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      padding-bottom: 0.3rem;
      scrollbar-width: thin;
    }

    .category-filters::-webkit-scrollbar {
      height: 3px;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-btn.active {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    /* Tasks Grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .task-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-color: #10b981;
    }

    .task-image {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task-image i {
      font-size: 40px;
      color: white;
    }

    .task-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      color: white;
      font-size: 0.6rem;
    }

    .task-content {
      padding: 0.8rem;
    }

    .task-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: #0f172a;
    }

    .task-description {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-top: 0.4rem;
      border-top: 1px solid #e2e8f0;
    }

    .task-time {
      font-size: 0.6rem;
      color: #94a3b8;
    }

    .task-reward {
      font-weight: 800;
      color: #10b981;
      font-size: 0.85rem;
    }

    .task-footer {
      display: flex;
      justify-content: flex-end;
    }

    .start-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .completed-badge {
      color: #10b981;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Task Modal - Stunning Design */
    .task-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-container {
      background: white;
      border-radius: 40px;
      max-width: 550px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 2px solid #f1f5f9;
      position: sticky;
      top: 0;
      background: white;
      border-radius: 40px 40px 0 0;
    }

    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: #e2e8f0;
      transform: rotate(90deg);
    }

    .task-instructions {
      padding: 1.5rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .task-instructions h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }

    .task-instructions ul {
      list-style: none;
      padding-left: 0;
    }

    .task-instructions li {
      padding: 0.4rem 0;
      padding-left: 1.5rem;
      position: relative;
      font-size: 0.8rem;
      color: #475569;
    }

    .task-instructions li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #10b981;
      font-weight: bold;
    }

    .task-submission {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .form-label .required {
      color: #ef4444;
      margin-left: 4px;
    }

    .form-input, .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-family: inherit;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .rating-stars {
      display: flex;
      gap: 0.5rem;
      font-size: 1.8rem;
    }

    .rating-stars i {
      cursor: pointer;
      color: #cbd5e1;
      transition: all 0.2s;
    }

    .rating-stars i:hover,
    .rating-stars i.active {
      color: #fbbf24;
    }

    .file-upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-upload-area:hover {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .file-upload-area i {
      font-size: 2rem;
      color: #10b981;
      margin-bottom: 0.5rem;
    }

    .file-upload-area p {
      font-size: 0.75rem;
      color: #64748b;
    }

    .file-upload-area input {
      display: none;
    }

    .file-selected {
      background: #f0fdf4;
      padding: 0.75rem;
      border-radius: 12px;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-footer {
      padding: 1rem 1.5rem 1.5rem;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      border-top: 1px solid #f1f5f9;
    }

    .submit-task-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-task-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    /* Reward Animation */
    .reward-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1rem 2rem;
      border-radius: 60px;
      font-size: 1.5rem;
      font-weight: 800;
      z-index: 2100;
      animation: floatUp 0.8s ease forwards;
      white-space: nowrap;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      80% {
        opacity: 1;
        transform: translate(-50%, -80px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -120px) scale(0.8);
      }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      grid-column: span 2;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .sidebar {
        transform: translateX(0);
      }
      
      .top-bar {
        justify-content: flex-end;
      }
      
      .menu-left {
        display: none;
      }
      
      .user-info {
        display: block;
      }
      
      .main-content {
        margin-left: 280px;
        padding: 2rem;
      }
      
      .tasks-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem;
      }
      
      .task-image {
        height: 120px;
      }
      
      .task-image i {
        font-size: 48px;
      }
    }

    @media (min-width: 1024px) {
      .tasks-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="menu-left">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    <div class="user-section">
      <div class="notification-bell" onclick="showToast('No new notifications')">
        <i class="far fa-bell"></i>
        <div class="notification-dot"></div>
      </div>
      <div class="user-card" onclick="navigateTo('profile')">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <h4 id="userName">Loading...</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <!-- Premium Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <div>
          <div class="logo-text">TaskPay</div>
          <div class="logo-badge">60+ Tasks</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" onclick="navigateTo('dashboard')">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item active" onclick="navigateTo('tasks')">
        <i class="fas fa-tasks"></i>
        <span>My Tasks</span>
      </div>
      <div class="nav-item" onclick="navigateTo('surveys')">
        <i class="fas fa-poll"></i>
        <span>Surveys</span>
      </div>
      <div class="nav-item" onclick="navigateTo('withdrawals')">
        <i class="fas fa-wallet"></i>
        <span>Withdrawals</span>
      </div>
      <div class="nav-item" onclick="navigateTo('profile')">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </div>
      <div class="nav-item" onclick="navigateTo('support')">
        <i class="fas fa-headset"></i>
        <span>Support</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h1>✨ Premium Tasks</h1>
      <p>Complete tasks & earn real money instantly</p>
    </div>

    <div class="stats-summary">
      <div class="stats-summary-item">
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Earned</div>
        <div class="value" id="tasksEarned">$0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available</div>
        <div class="value" id="availableCount">0</div>
      </div>
    </div>

    <div class="category-filters" id="categoryFilters"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest Reward</button>
    </div>

    <div id="tasksContainer" class="tasks-grid"></div>
  </div>

  <!-- Task Modal -->
  <div id="taskModal" class="task-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">Complete Task</h2>
        <button class="modal-close" onclick="closeTaskModal()">&times;</button>
      </div>
      <div class="task-instructions" id="taskInstructions"></div>
      <div class="task-submission" id="taskSubmission"></div>
      <div class="modal-footer">
        <button class="submit-task-btn" id="submitTaskBtn" onclick="submitTaskCompletion()">
          <i class="fas fa-check-circle"></i> Submit & Earn
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';
    
    // ============ 60+ TASKS ============

    function navigateTo(page) {
      const pages = { 'dashboard': 'dashboard.html', 'tasks': 'tasks.html', 'surveys': 'surveys.html', 'withdrawals': 'withdrawal.html', 'profile': 'profile.html', 'support': 'support.html' };

    async function checkAuth() {
      const isLoggedIn = localStorage.getItem('taskpay_logged_in');
      const userEmail = localStorage.getItem('taskpay_user_email');
      
      if (isLoggedIn === 'true' && userEmail) {
        currentUser = userEmail;
        userId = localStorage.getItem('taskpay_user_id');
        return true;
      }
      
      try {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (!error && user) {
          currentUser = user.email;
          userId = user.id;
          localStorage.setItem('taskpay_logged_in', 'true');
          localStorage.setItem('taskpay_user_email', currentUser);
          localStorage.setItem('taskpay_user_id', userId);
          return true;
        }
      } catch(e) { console.log('Supabase not connected'); }
      
      window.location.href = 'login.html';
      return false;
    }

    async function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      let totalEarned = 0;
      let completedTasksArray = [];
      
      // Try to get data from Supabase first
      if (userId && userId !== 'null') {
        try {
          const { data: profile } = await supabase.from('profiles').select('total_earned, tasks_completed').eq('id', userId).single();
          if (profile) totalEarned = profile.total_earned || 0;
          
          const { data: userTasks } = await supabase.from('user_tasks').select('task_id').eq('user_id', userId);
          if (userTasks) completedTasksArray = userTasks.map(t => t.task_id);
        } catch(e) { console.log('Supabase fetch failed, using localStorage'); }
      }
      
      // Fallback to localStorage
      if (completedTasksArray.length === 0) {
        completedTasksArray = JSON.parse(localStorage.getItem(`taskpay_completed_tasks_${userKey}`) || '[]');
      }
      if (totalEarned === 0) totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      
      tasksEarned = totalEarned;
      tasks = allTasks.map(t => ({ ...t, completed: completedTasksArray.includes(t.id) }));
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userName').textContent = userName;
      document.getElementById('userEmail').textContent = currentUser;
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
      
      updateStats();
      renderCategoryFilters();
      renderTasks();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
      document.getElementById('availableCount').textContent = tasks.filter(t => !t.completed).length;
      document.getElementById('tasksEarned').textContent = `$${tasksEarned.toFixed(2)}`;
    }

    function renderCategoryFilters() {
      const categories = [
        { id: 'all', name: 'All', icon: 'fa-th-large' },
        { id: 'ai', name: '🤖 AI', icon: 'fa-robot' },
        { id: 'tech', name: '💻 Tech', icon: 'fa-laptop-code' },
        { id: 'social', name: '📱 Social', icon: 'fa-share-alt' },
        { id: 'creative', name: '🎨 Creative', icon: 'fa-palette' },
        { id: 'ecommerce', name: '🛍️ Shop', icon: 'fa-shopping-cart' },
        { id: 'education', name: '📚 Education', icon: 'fa-graduation-cap' },
        { id: 'daily', name: '☀️ Daily', icon: 'fa-calendar-day' }
      ];
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `<button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}"><i class="fas ${cat.icon}"></i> ${cat.name}</button>`).join('');
      document.querySelectorAll('.category-btn').forEach(btn => { btn.addEventListener('click', () => { currentCategory = btn.dataset.category; renderCategoryFilters(); renderTasks(); }); });
    }

    function renderTasks() {
      let filtered = tasks.filter(t => currentCategory === 'all' || t.category === currentCategory);
      if (currentFilter === 'available') filtered = filtered.filter(t => !t.completed);
      else if (currentFilter === 'completed') filtered = filtered.filter(t => t.completed);
      else if (currentFilter === 'highest') filtered = [...filtered].sort((a, b) => b.reward - a.reward);
      const container = document.getElementById('tasksContainer');
      if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-tasks"></i><h3>No tasks found</h3><p>Check back later!</p></div>`; return; }
      container.innerHTML = filtered.map(task => `<div class="task-card" onclick="openTaskModal('${task.id}')"><div class="task-image" style="background: linear-gradient(135deg, ${task.color}99, ${task.color});"><i class="fas ${task.icon}"></i><span class="task-badge">${task.time}</span></div><div class="task-content"><h3 class="task-title">${task.title}</h3><p class="task-description">${task.description}</p><div class="task-meta"><span class="task-time"><i class="fas fa-clock"></i> ${task.time}</span><span class="task-reward">+$${task.reward.toFixed(2)}</span></div><div class="task-footer">${task.completed ? '<span class="completed-badge"><i class="fas fa-check-circle"></i> Completed</span>' : '<button class="start-btn" onclick="event.stopPropagation(); openTaskModal(\'' + task.id + '\')">Start Task →</button>'}</div></div></div>`).join('');
    }

    function openTaskModal(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task.completed) { showToast('Already completed!'); return; }
      currentTask = task;
      taskRating = 0;
      taskFeedback = '';
      uploadedFile = null;
      document.getElementById('modalTitle').innerHTML = `<i class="fas ${task.icon}"></i> ${task.title}`;
      document.getElementById('taskInstructions').innerHTML = `<h3>📋 Instructions</h3><ul>${task.instructions.map(inst => `<li>${inst}</li>`).join('')}</ul><div class="task-reward" style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #e2e8f0;"><span style="font-weight: 700;">Reward:</span> <span style="color: #10b981; font-weight: 800;">+$${task.reward.toFixed(2)}</span></div>`;
      document.getElementById('taskSubmission').innerHTML = `<div class="form-group"><label class="form-label">Your Feedback <span class="required">*</span></label><textarea class="form-textarea" id="taskFeedbackInput" placeholder="Share your thoughts, answer the question, or provide feedback..."></textarea></div><div class="form-group"><label class="form-label">Rating</label><div class="rating-stars" id="taskRatingStars"><i class="far fa-star" data-rating="1"></i><i class="far fa-star" data-rating="2"></i><i class="far fa-star" data-rating="3"></i><i class="far fa-star" data-rating="4"></i><i class="far fa-star" data-rating="5"></i></div></div><div class="form-group"><label class="form-label">Upload (if required)</label><div class="file-upload-area" id="taskFileUpload"><i class="fas fa-cloud-upload-alt"></i><p>Click to upload screenshot or file</p><input type="file" id="taskFileInput" accept="image/*"></div><div id="taskFileInfo"></div></div>`;
      document.getElementById('taskModal').style.display = 'flex';
      
      setTimeout(() => {
        const stars = document.querySelectorAll('#taskRatingStars i');
        stars.forEach(star => {
          star.addEventListener('click', function() {
            const rating = parseInt(this.dataset.rating);
            taskRating = rating;
            stars.forEach(s => { const starRating = parseInt(s.dataset.rating); if (starRating <= rating) { s.className = 'fas fa-star'; s.style.color = '#fbbf24'; } else { s.className = 'far fa-star'; s.style.color = '#cbd5e1'; } });
          });
        });
        const fileUpload = document.getElementById('taskFileUpload');
        const fileInput = document.getElementById('taskFileInput');
        if (fileUpload && fileInput) {
          fileUpload.addEventListener('click', () => fileInput.click());
          fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
              uploadedFile = e.target.files[0];
              document.getElementById('taskFileInfo').innerHTML = `<div class="file-selected"><span><i class="fas fa-check-circle" style="color: #10b981;"></i> ${uploadedFile.name}</span><i class="fas fa-times" style="cursor: pointer; color: #ef4444;" onclick="clearTaskFile()"></i></div>`;
            }
          });
        }
      }, 100);
    }

    function clearTaskFile() { uploadedFile = null; document.getElementById('taskFileInfo').innerHTML = ''; }

    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }

    async function submitTaskCompletion() {
      const feedback = document.getElementById('taskFeedbackInput')?.value || '';
      if (!feedback.trim()) { showToast('Please provide your feedback!'); return; }
      
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      
      // Save to Supabase if user is authenticated
      if (userId && userId !== 'null') {
        try {
          // Save to user_tasks table
          await supabase.from('user_tasks').insert({
            user_id: userId,
            task_id: currentTask.id,
            task_title: currentTask.title,
            reward: currentTask.reward
          });
          
          // Update profile totals
          const { data: profile } = await supabase.from('profiles').select('total_earned, tasks_completed').eq('id', userId).single();
          const newTasksCompleted = (profile?.tasks_completed || 0) + 1;
          const newTotalEarned = (profile?.total_earned || 0) + currentTask.reward;
          await supabase.from('profiles').update({ tasks_completed: newTasksCompleted, total_earned: newTotalEarned }).eq('id', userId);
          
          // Record transaction
          await supabase.from('transactions').insert({
            user_id: userId,
            amount: currentTask.reward,
            type: 'earning',
            status: 'completed'
          });
          
          tasksEarned = newTotalEarned;
        } catch(e) { console.log('Supabase save failed, using localStorage'); }
      }
      
      // Always save to localStorage as backup
      completedTaskIds.push(currentTask.id);
      localStorage.setItem(`taskpay_completed_tasks_${userKey}`, JSON.stringify(completedTaskIds));
      let balance = parseFloat(localStorage.getItem(`taskpay_balance_${userKey}`) || '0');
      let totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      let tasksDone = parseInt(localStorage.getItem(`taskpay_tasks_done_${userKey}`) || '0');
      balance += currentTask.reward;
      totalEarned += currentTask.reward;
      tasksDone += 1;
      localStorage.setItem(`taskpay_balance_${userKey}`, balance.toFixed(2));
      localStorage.setItem(`taskpay_total_earned_${userKey}`, totalEarned.toFixed(2));
      localStorage.setItem(`taskpay_tasks_done_${userKey}`, tasksDone);
      
      tasksEarned = totalEarned;
      currentTask.completed = true;
      closeTaskModal();
      updateStats();
      renderTasks();
      
      const anim = document.createElement('div');
      anim.className = 'reward-animation';
      anim.innerHTML = `+$${currentTask.reward.toFixed(2)} 🎉`;
      document.body.appendChild(anim);
      setTimeout(() => anim.remove(), 800);
      showToast(`🎉 Task completed! +$${currentTask.reward.toFixed(2)} earned!`);
    }

    function showToast(message) { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    
    async function logout() { 
      if (confirm('Logout?')) { 
        try { await supabase.auth.signOut(); } catch(e) {}
        localStorage.removeItem('taskpay_logged_in'); 
        localStorage.removeItem('taskpay_user_email'); 
        localStorage.removeItem('taskpay_user_id');
        window.location.href = 'login.html'; 
      } 
    }

    document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderTasks(); }); });
    const menuToggle = document.getElementById('menuToggle'); const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    document.addEventListener('click', (e) => { if (window.innerWidth < 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) sidebar.classList.remove('open'); });
    document.getElementById('logoutBtn').addEventListener('click', logout);
    window.navigateTo = navigateTo; window.openTaskModal = openTaskModal; window.closeTaskModal = closeTaskModal; window.submitTaskCompletion = submitTaskCompletion; window.clearTaskFile = clearTaskFile;
    
    (async function() {
      if (await checkAuth()) {
        await loadUserData();
      }
    })();
  </script>
</body>
</html>
