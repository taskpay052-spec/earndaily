<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Premium Task Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(16, 185, 129, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
    }

    .logo-icon i {
      color: white;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      text-decoration: none;
      color: #475569;
      font-weight: 500;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(135deg, #10b981, #059669);
      transition: width 0.3s;
    }

    .nav-link:hover:after, .nav-link.active:after {
      width: 100%;
    }

    .nav-link:hover, .nav-link.active {
      color: #059669;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .user-avatar:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 8px;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      color: #dc2626;
      transform: rotate(90deg);
    }

    /* Main Content */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      animation: fadeInUp 0.6s ease;
    }

    .page-header p {
      color: #64748b;
      font-size: 1.1rem;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Stats Summary */
    .stats-summary {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 20px 35px -10px rgba(16, 185, 129, 0.3);
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .stats-summary-item {
      color: white;
      text-align: center;
      flex: 1;
      transition: transform 0.3s;
    }

    .stats-summary-item:hover {
      transform: translateY(-5px);
    }

    .stats-summary-item .label {
      font-size: 0.875rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats-summary-item .value {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 0.5rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      padding: 0.6rem 1.25rem;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-btn i {
      font-size: 0.875rem;
    }

    .category-btn:hover {
      border-color: #10b981;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }

    .category-btn.active {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn.active {
      background: #059669;
      border-color: #059669;
      color: white;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }

    .filter-btn:hover:not(.active) {
      border-color: #10b981;
      color: #059669;
      transform: translateY(-2px);
    }

    /* Tasks Grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .task-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(16, 185, 129, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
    }

    .task-card:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #10b981, #059669, #10b981);
      transform: scaleX(0);
      transition: transform 0.4s;
    }

    .task-card:hover:before {
      transform: scaleX(1);
    }

    .task-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
      border-color: #10b981;
    }

    .task-image {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .task-image i {
      font-size: 56px;
      color: white;
      opacity: 0.9;
      transition: transform 0.4s;
    }

    .task-card:hover .task-image i {
      transform: scale(1.1) rotate(5deg);
    }

    .task-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .category-tag {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      color: white;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .task-content {
      padding: 1.5rem;
    }

    .task-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .task-description {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .task-time, .task-difficulty {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .difficulty-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .difficulty-easy { background: #d1fae5; color: #065f46; }
    .difficulty-medium { background: #fed7aa; color: #9a3412; }
    .difficulty-hard { background: #fee2e2; color: #dc2626; }

    .task-reward {
      font-weight: 800;
      color: #059669;
      font-size: 1.25rem;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #10b981;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .start-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .start-btn:hover {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem;
      background: white;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
    }

    .empty-state i {
      font-size: 64px;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }
      .nav-container {
        padding: 1rem;
      }
      .nav-links {
        display: none;
      }
      .tasks-grid {
        grid-template-columns: 1fr;
      }
      .stats-summary {
        flex-direction: column;
        text-align: center;
      }
      .page-header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="navigateTo('dashboard')">

    // Complete Task Data with 30+ premium tasks

      { id: "task_8", title: "📸 Instagram Story Feedback", description: "Review Instagram story designs", reward: 0.65, timeEstimate: "1 min", category: "social", icon: "fa-instagram", color: "#f43f5e", difficulty: "easy" },

      { id: "task_20", title: "📢 Ad Campaign Feedback", description: "Review and rate ad campaigns", reward: 0.75, timeEstimate: "2 min", category: "research", icon: "fa-chart-line", color: "#fb923c", difficulty: "medium" },
      { id: "task_21", title: "🎨 Color Scheme Testing", description: "Rate different color combinations", reward: 0.50, timeEstimate: "1 min", category: "research", icon: "fa-eye-dropper", color: "#fdba74", difficulty: "easy" },
      
      // Voice & Audio
      { id: "task_22", title: "🎙️ Voice Recording", description: "Record 15-second voice clip", reward: 0.80, timeEstimate: "1 min", category: "audio", icon: "fa-microphone", color: "#ec489a", difficulty: "easy" },
      { id: "task_23", title: "🎧 Podcast Review", description: "Listen and review podcast episode", reward: 0.90, timeEstimate: "3 min", category: "audio", icon: "fa-podcast", color: "#f472b6", difficulty: "medium" },
      { id: "task_24", title: "📝 Audio Transcription", description: "Transcribe 30-second audio clip", reward: 1.10, timeEstimate: "2 min", category: "audio", icon: "fa-file-audio", color: "#f9a8d4", difficulty: "medium" },
      
      // Daily Quick Tasks
      { id: "task_25", title: "☀️ Daily Check-in", description: "Log in and claim your daily reward", reward: 0.15, timeEstimate: "10 sec", category: "daily", icon: "fa-calendar-check", color: "#10b981", difficulty: "easy" },
      { id: "task_26", title: "🌤️ Weather Update", description: "Share today's weather in your city", reward: 0.20, timeEstimate: "30 sec", category: "daily", icon: "fa-cloud-sun", color: "#34d399", difficulty: "easy" },
      { id: "task_27", title: "💭 Quote of Day Share", description: "Share an inspiring quote", reward: 0.25, timeEstimate: "30 sec", category: "daily", icon: "fa-quote-left", color: "#6ee7b7", difficulty: "easy" },

      // Local Tasks
      { id: "task_29", title: "🏪 Local Business Photo", description: "Take photo of local business", reward: 1.50, timeEstimate: "3 min", category: "local", icon: "fa-building", color: "#ef4444", difficulty: "hard" },
      { id: "task_30", title: "🍽️ Restaurant Review", description: "Review a local restaurant", reward: 1.00, timeEstimate: "2 min", category: "local", icon: "fa-utensils", color: "#f97316", difficulty: "medium" },
      { id: "task_31", title: "📍 Store Check-in", description: "Check-in at a store location", reward: 0.80, timeEstimate: "1 min", category: "local", icon: "fa-map-marker-alt", color: "#fb923c", difficulty: "easy" }
    ];

    let tasks = [];
    let currentUser = null;
    let completedTasks = [];
    let currentFilter = 'all';
    let currentCategory = 'all';
    let tasksEarned = 0;

    function checkAuth() {
      const isLoggedIn = localStorage.getItem('taskpay_logged_in');
      if (isLoggedIn !== 'true') {
        window.location.href = 'login.html';
        return false;
      }
      currentUser = localStorage.getItem('taskpay_user_email');
      if (!currentUser) {
        currentUser = 'user@taskpay.com';
        localStorage.setItem('taskpay_user_email', currentUser);
      }
      loadUserData();
      return true;
    }

    function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      const storedCompleted = localStorage.getItem(`taskpay_completed_tasks_${userKey}`);
      completedTasks = storedCompleted ? JSON.parse(storedCompleted) : [];
      
      tasksEarned = 0;
      tasks = allTasks.map(task => {
        const isCompleted = completedTasks.includes(task.id);
        if (isCompleted) tasksEarned += task.reward;
        return { ...task, completed: isCompleted };
      });
      
      localStorage.setItem(`taskpay_total_earned_${userKey}`, tasksEarned.toFixed(2));
      localStorage.setItem(`taskpay_tasks_done_${userKey}`, completedTasks.length.toString());
      
      updateStats();
      renderCategoryFilters();
      renderTasks();
    }

    function updateStats() {
      const completedCount = tasks.filter(t => t.completed).length;
      const availableCount = tasks.filter(t => !t.completed).length;
      
      document.getElementById('completedCount').textContent = completedCount;
      document.getElementById('availableCount').textContent = availableCount;
      document.getElementById('tasksEarned').textContent = `$${tasksEarned.toFixed(2)}`;
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    }

    function renderCategoryFilters() {
      const categories = [
        { id: 'all', name: 'All', icon: 'fa-th-large' },
        { id: 'ai', name: '🤖 AI', icon: 'fa-robot' },
        { id: 'ecommerce', name: '🛍️ E-commerce', icon: 'fa-shopping-cart' },
        { id: 'social', name: '📱 Social', icon: 'fa-share-alt' },
        { id: 'creative', name: '🎨 Creative', icon: 'fa-palette' },
        { id: 'tech', name: '💻 Tech', icon: 'fa-laptop-code' },
        { id: 'education', name: '📚 Education', icon: 'fa-graduation-cap' },
        { id: 'research', name: '📊 Research', icon: 'fa-chart-line' },
        { id: 'audio', name: '🎙️ Audio', icon: 'fa-microphone' },
        { id: 'daily', name: '☀️ Daily', icon: 'fa-calendar-day' },
        { id: 'local', name: '📍 Local', icon: 'fa-map-marker-alt' }
      ];
      
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `
        <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">
          <i class="fas ${cat.icon}"></i>
          <span>${cat.name}</span>
        </button>
      `).join('');
      
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.category;
          renderCategoryFilters();
          renderTasks();
        });
      });
    }

    function renderTasks() {
      let filteredTasks = [...tasks];
      
      if (currentCategory !== 'all') {
        filteredTasks = filteredTasks.filter(t => t.category === currentCategory);
      }
      
      switch(currentFilter) {
        case 'available':
          filteredTasks = filteredTasks.filter(t => !t.completed);
          break;
        case 'completed':
          filteredTasks = filteredTasks.filter(t => t.completed);
          break;
        case 'highest':
          filteredTasks = [...filteredTasks].sort((a, b) => b.reward - a.reward);
          break;
        default:
          filteredTasks = [...filteredTasks];
      }
      
      const container = document.getElementById('tasksContainer');
      
      if (filteredTasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-tasks"></i>
            <h3>No tasks found</h3>
            <p>${currentFilter === 'completed' ? 'You haven\'t completed any tasks yet.' : 'Check back later for new tasks!'}</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filteredTasks.map(task => `
        <div class="task-card">
          <div class="task-image" style="background: linear-gradient(135deg, ${task.color}99, ${task.color});">
            <i class="fas ${task.icon}"></i>
            <span class="task-badge">${task.timeEstimate}</span>
            <span class="category-tag">${getCategoryName(task.category)}</span>
          </div>
          <div class="task-content">
            <h3 class="task-title">${task.title}</h3>
            <p class="task-description">${task.description}</p>
            <div class="task-meta">
              <div class="task-time">
                <i class="fas fa-clock"></i>
                <span>${task.timeEstimate}</span>
              </div>
              <div class="task-difficulty">
                <span class="difficulty-badge difficulty-${task.difficulty}">${task.difficulty.toUpperCase()}</span>
              </div>
              <div class="task-reward">
                <i class="fas fa-dollar-sign"></i> ${task.reward.toFixed(2)}
              </div>
            </div>
            <div class="task-footer">
              ${task.completed ? 
                `<div class="completed-badge">
                  <i class="fas fa-check-circle"></i>
                  <span>Completed</span>
                </div>` : 
                `<button class="start-btn" onclick="startTask('${task.id}')">
                  <i class="fas fa-play"></i> Start Task
                </button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function getCategoryName(category) {
      const names = {
        'ai': 'AI',
        'ecommerce': 'E-commerce',
        'social': 'Social',
        'creative': 'Creative',
        'tech': 'Tech',
        'education': 'Education',
        'research': 'Research',
        'audio': 'Audio',
        'daily': 'Daily',
        'local': 'Local'
      };
      return names[category] || category;
    }

    function startTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task.completed) {
        showToast('You already completed this task!');
        return;
      }
      sessionStorage.setItem('current_task', JSON.stringify(task));
      showToast('Loading task...');
      setTimeout(() => window.location.href = `task-detail.html?id=${taskId}`, 500);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('taskpay_logged_in');
        localStorage.removeItem('taskpay_user_email');
        showToast('Logged out successfully');
        setTimeout(() => window.location.href = 'login.html', 500);
      }
    }

    window.navigateTo = navigateTo;
    window.startTask = startTask;
    window.logout = logout;

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);
    
    if (checkAuth()) {}
  </script>
</body>
</html>
