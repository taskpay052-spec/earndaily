<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Inter', sans-serif;
      color: #1a1f36;
      overflow-x: hidden;
    }

    /* Premium Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      transition: all 0.3s;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }

    .logo-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      color: #94a3b8;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
    }

    .nav-item span {
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Mobile Menu Button */
    .menu-toggle {
      display: block;
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 1001;
      background: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Main Content */
    .main-content {
      margin-left: 0;
      padding: 1rem;
      transition: margin-left 0.3s;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-top: 0.5rem;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notification-bell {
      position: relative;
      cursor: pointer;
    }

    .notification-bell i {
      font-size: 1.2rem;
      color: #64748b;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .user-info h4 {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .user-info p {
      font-size: 0.65rem;
      color: #64748b;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.85rem;
    }

    /* Hero Stats */
    .stats-summary {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.7rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      padding-bottom: 0.3rem;
      scrollbar-width: thin;
    }

    .category-filters::-webkit-scrollbar {
      height: 3px;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-btn.active {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    /* Tasks Grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .task-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-color: #10b981;
    }

    .task-image {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task-image i {
      font-size: 40px;
      color: white;
    }

    .task-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      color: white;
      font-size: 0.6rem;
    }

    .task-content {
      padding: 0.8rem;
    }

    .task-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: #0f172a;
    }

    .task-description {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-top: 0.4rem;
      border-top: 1px solid #e2e8f0;
    }

    .task-time {
      font-size: 0.6rem;
      color: #94a3b8;
    }

    .task-reward {
      font-weight: 800;
      color: #10b981;
      font-size: 0.85rem;
    }

    .task-footer {
      display: flex;
      justify-content: flex-end;
    }

    .start-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .completed-badge {
      color: #10b981;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      grid-column: span 2;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1000;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .sidebar {
        transform: translateX(0);
      }
      
      .menu-toggle {
        display: none;
      }
      
      .main-content {
        margin-left: 280px;
        padding: 2rem;
      }
      
      .tasks-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem;
      }
      
      .task-image {
        height: 120px;
      }
      
      .task-image i {
        font-size: 48px;
      }
    }

    @media (min-width: 1024px) {
      .tasks-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Mobile Menu Toggle -->
  <button class="menu-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Premium Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <div>
          <div class="logo-text">TaskPay</div>
          <div class="logo-badge">Premium Dashboard</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" onclick="navigateTo('dashboard')">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item active" onclick="navigateTo('tasks')">
        <i class="fas fa-tasks"></i>
        <span>My Tasks</span>
      </div>
      <div class="nav-item" onclick="navigateTo('surveys')">
        <i class="fas fa-poll"></i>
        <span>Surveys</span>
      </div>
      <div class="nav-item" onclick="navigateTo('withdrawals')">
        <i class="fas fa-wallet"></i>
        <span>Withdrawals</span>
      </div>
      <div class="nav-item" onclick="navigateTo('profile')">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </div>
      <div class="nav-item" onclick="navigateTo('support')">
        <i class="fas fa-headset"></i>
        <span>Support</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="user-section">
        <div class="notification-bell" onclick="showToast('No new notifications')">
          <i class="far fa-bell"></i>
        </div>
        <div class="user-card" onclick="navigateTo('profile')">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <h4 id="userName">Loading...</h4>
            <p id="userEmail">user@example.com</p>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <h1>✨ Premium Tasks</h1>
      <p>Complete tasks & earn real money instantly</p>
    </div>

    <!-- Stats Summary -->
    <div class="stats-summary">
      <div class="stats-summary-item">
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Earned</div>
        <div class="value" id="tasksEarned">$0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available</div>
        <div class="value" id="availableCount">0</div>
      </div>
    </div>

    <!-- Category Filters -->
    <div class="category-filters" id="categoryFilters"></div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest Reward</button>
    </div>

    <!-- Tasks Grid -->
    <div id="tasksContainer" class="tasks-grid"></div>
  </div>

  <script>
    const allTasks = [
      { id: "task_1", title: "🤖 AI Image Review", description: "Rate AI-generated images", reward: 1.25, time: "2 min", category: "ai", icon: "fa-robot", color: "#8b5cf6", difficulty: "medium" },
      { id: "task_2", title: "💬 ChatGPT Testing", description: "Test AI prompts", reward: 1.50, time: "3 min", category: "ai", icon: "fa-comment-dots", color: "#a855f7", difficulty: "hard" },
      { id: "task_3", title: "🎙️ Voice Feedback", description: "Test voice commands", reward: 0.90, time: "1 min", category: "ai", icon: "fa-microphone-alt", color: "#c084fc", difficulty: "easy" },
      { id: "task_4", title: "🛍️ Product Review", description: "Write review with photo", reward: 1.25, time: "3 min", category: "ecommerce", icon: "fa-camera", color: "#f59e0b", difficulty: "medium" },
      { id: "task_5", title: "💰 Price Compare", description: "Compare 3 websites", reward: 0.70, time: "2 min", category: "ecommerce", icon: "fa-tags", color: "#f97316", difficulty: "easy" },
      { id: "task_6", title: "📱 TikTok Trends", description: "Analyze trending videos", reward: 0.95, time: "2 min", category: "social", icon: "fa-tiktok", color: "#ec489a", difficulty: "medium" },
      { id: "task_7", title: "✍️ Short Story", description: "Write 3-sentence story", reward: 0.85, time: "2 min", category: "creative", icon: "fa-feather-alt", color: "#14b8a6", difficulty: "medium" },
      { id: "task_8", title: "📱 App Testing", description: "Test new app features", reward: 2.50, time: "5 min", category: "tech", icon: "fa-mobile-alt", color: "#3b82f6", difficulty: "hard" },
      { id: "task_9", title: "📚 Quiz", description: "Complete quiz", reward: 0.70, time: "2 min", category: "education", icon: "fa-graduation-cap", color: "#10b981", difficulty: "easy" },
      { id: "task_10", title: "☀️ Daily Check-in", description: "Claim daily reward", reward: 0.15, time: "10 sec", category: "daily", icon: "fa-calendar-check", color: "#10b981", difficulty: "easy" }
    ];

    let tasks = [], currentUser = null, completedTasks = [], currentFilter = 'all', currentCategory = 'all', tasksEarned = 0;

    function navigateTo(page) {
      const pages = { 
        'dashboard': 'dashboard.html', 
        'tasks': 'tasks.html', 
        'surveys': 'surveys.html', 
        'withdrawals': 'withdrawal.html', 
        'profile': 'profile.html',
        'support': 'support.html'
      };
      window.location.href = pages[page] || '#';
    }

    function checkAuth() {
      if (localStorage.getItem('taskpay_logged_in') !== 'true') { 
        window.location.href = 'login.html'; 
        return false; 
      }
      currentUser = localStorage.getItem('taskpay_user_email') || 'user@taskpay.com';
      loadUserData();
      return true;
    }

    function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completedTasks = JSON.parse(localStorage.getItem(`taskpay_completed_tasks_${userKey}`) || '[]');
      tasksEarned = 0;
      tasks = allTasks.map(t => { 
        const completed = completedTasks.includes(t.id); 
        if (completed) tasksEarned += t.reward; 
        return { ...t, completed }; 
      });
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userName').textContent = userName;
      document.getElementById('userEmail').textContent = currentUser;
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
      
      updateStats();
      renderCategoryFilters();
      renderTasks();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
      document.getElementById('availableCount').textContent = tasks.filter(t => !t.completed).length;
      document.getElementById('tasksEarned').textContent = `$${tasksEarned.toFixed(2)}`;
    }

    function renderCategoryFilters() {
      const categories = [
        { id: 'all', name: 'All', icon: 'fa-th-large' },
        { id: 'ai', name: '🤖 AI', icon: 'fa-robot' },
        { id: 'ecommerce', name: '🛍️ Shop', icon: 'fa-shopping-cart' },
        { id: 'social', name: '📱 Social', icon: 'fa-share-alt' },
        { id: 'creative', name: '🎨 Creative', icon: 'fa-palette' },
        { id: 'tech', name: '💻 Tech', icon: 'fa-laptop-code' },
        { id: 'daily', name: '☀️ Daily', icon: 'fa-calendar-day' }
      ];
      
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `
        <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">
          <i class="fas ${cat.icon}"></i> ${cat.name}
        </button>
      `).join('');
      
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.category;
          renderCategoryFilters();
          renderTasks();
        });
      });
    }

    function renderTasks() {
      let filtered = tasks.filter(t => currentCategory === 'all' || t.category === currentCategory);
      
      if (currentFilter === 'available') {
        filtered = filtered.filter(t => !t.completed);
      } else if (currentFilter === 'completed') {
        filtered = filtered.filter(t => t.completed);
      } else if (currentFilter === 'highest') {
        filtered = [...filtered].sort((a, b) => b.reward - a.reward);
      }
      
      const container = document.getElementById('tasksContainer');
      
      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-tasks"></i>
            <h3>No tasks found</h3>
            <p>Check back later for new tasks!</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filtered.map(task => `
        <div class="task-card" onclick="startTask('${task.id}')">
          <div class="task-image" style="background: linear-gradient(135deg, ${task.color}99, ${task.color});">
            <i class="fas ${task.icon}"></i>
            <span class="task-badge">${task.time}</span>
          </div>
          <div class="task-content">
            <h3 class="task-title">${task.title}</h3>
            <p class="task-description">${task.description}</p>
            <div class="task-meta">
              <span class="task-time"><i class="fas fa-clock"></i> ${task.time}</span>
              <span class="task-reward">+$${task.reward.toFixed(2)}</span>
            </div>
            <div class="task-footer">
              ${task.completed ? 
                '<span class="completed-badge"><i class="fas fa-check-circle"></i> Completed</span>' : 
                '<button class="start-btn" onclick="event.stopPropagation(); startTask(\'' + task.id + '\')">Start Task →</button>'
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function startTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task.completed) {
        showToast('Already completed!');
        return;
      }
      
      if (confirm(`Complete "${task.title}" to earn $${task.reward.toFixed(2)}?`)) {
        completeTask(taskId);
      }
    }

    function completeTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      
      completedTasks.push(taskId);
      localStorage.setItem(`taskpay_completed_tasks_${userKey}`, JSON.stringify(completedTasks));
      
      let balance = parseFloat(localStorage.getItem(`taskpay_balance_${userKey}`) || '0');
      let totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      let tasksDone = parseInt(localStorage.getItem(`taskpay_tasks_done_${userKey}`) || '0');
      
      balance += task.reward;
      totalEarned += task.reward;
      tasksDone += 1;
      
      localStorage.setItem(`taskpay_balance_${userKey}`, balance.toFixed(2));
      localStorage.setItem(`taskpay_total_earned_${userKey}`, totalEarned.toFixed(2));
      localStorage.setItem(`taskpay_tasks_done_${userKey}`, tasksDone);
      
      tasksEarned += task.reward;
      task.completed = true;
      
      updateStats();
      renderTasks();
      showToast(`🎉 +$${task.reward.toFixed(2)} earned!`);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('taskpay_logged_in');
        localStorage.removeItem('taskpay_user_email');
        window.location.href = 'login.html';
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });
    
    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
    
    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', (e) => {
      if (window.innerWidth < 768 && sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
          sidebar.classList.remove('open');
        }
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', logout);
    window.navigateTo = navigateTo;
    window.startTask = startTask;
    
    if (checkAuth()) {}
  </script>
</body>
</html>
