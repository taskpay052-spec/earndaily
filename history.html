<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Transaction History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Inter', sans-serif; color: #0f172a; min-height: 100vh; }

    /* Navigation */
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(226,232,240,0.5); position: sticky; top: 0; z-index: 100; }
    .nav-container { max-width: 1280px; margin: 0 auto; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-icon i { color: white; font-size: 16px; }
    .logo-text { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #065f46, #059669); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-links { display: none; }
    .user-menu { display: flex; align-items: center; gap: 0.8rem; }
    .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    .logout-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; padding: 6px; }

    /* Main Container */
    .main-container { max-width: 1280px; margin: 0 auto; padding: 1rem; }

    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 20px; padding: 1rem; text-align: center; transition: all 0.3s; }
    .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.6rem; }
    .stat-icon.earnings { background: #d1fae5; color: #10b981; }
    .stat-icon.withdrawals { background: #fee2e2; color: #ef4444; }
    .stat-icon.tasks { background: #fed7aa; color: #f59e0b; }
    .stat-value { font-size: 1.2rem; font-weight: 800; }
    .stat-label { font-size: 0.6rem; color: #64748b; }

    /* Filter Section */
    .filter-section { background: white; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; }
    .filter-title { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.8rem; }
    .filter-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { padding: 0.4rem 0.9rem; background: #f1f5f9; border: none; border-radius: 40px; font-size: 0.7rem; font-weight: 500; cursor: pointer; }
    .filter-btn.active { background: #10b981; color: white; }
    .date-range { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: flex-end; }
    .date-input { flex: 1; min-width: 120px; }
    .date-input label { font-size: 0.6rem; font-weight: 500; color: #64748b; display: block; margin-bottom: 0.2rem; }
    .date-input input { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.7rem; }
    .reset-btn { padding: 0.4rem 0.8rem; background: #f1f5f9; border: none; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }

    /* Transactions Card */
    .transactions-card { background: white; border-radius: 20px; overflow: hidden; }
    .card-header { padding: 1rem; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .card-header h2 { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .export-btn { padding: 0.4rem 0.8rem; background: #f1f5f9; border: none; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }

    /* Table */
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { text-align: left; padding: 0.7rem 1rem; background: #f8fafc; font-weight: 600; font-size: 0.7rem; color: #475569; border-bottom: 1px solid #e2e8f0; }
    td { padding: 0.7rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; }
    tr:hover { background: #f8fafc; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.2rem 0.6rem; border-radius: 30px; font-size: 0.6rem; font-weight: 600; }
    .badge.earnings { background: #d1fae5; color: #10b981; }
    .badge.withdrawal { background: #fee2e2; color: #ef4444; }
    .badge.task { background: #fed7aa; color: #f59e0b; }
    .badge.survey { background: #c7d2fe; color: #4f46e5; }
    .badge.completed { background: #d1fae5; color: #10b981; }
    .badge.pending { background: #fed7aa; color: #f59e0b; }
    .amount-positive { color: #10b981; font-weight: 600; }
    .amount-negative { color: #ef4444; font-weight: 600; }

    /* Empty State */
    .empty-state { text-align: center; padding: 2rem; }
    .empty-state i { font-size: 2.5rem; color: #cbd5e1; margin-bottom: 0.5rem; }
    .empty-state h3 { font-size: 0.9rem; margin-bottom: 0.3rem; }
    .empty-state p { font-size: 0.7rem; color: #64748b; }

    /* Pagination */
    .pagination { padding: 1rem; display: flex; justify-content: center; gap: 0.4rem; border-top: 1px solid #f1f5f9; }
    .page-btn { padding: 0.3rem 0.6rem; background: #f1f5f9; border: none; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
    .page-btn.active { background: #10b981; color: white; }

    /* Toast */
    .toast { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 0.5rem 1rem; border-radius: 40px; font-size: 0.7rem; z-index: 1000; white-space: nowrap; }

    @media (min-width: 768px) {
      .main-container { padding: 2rem; }
      .nav-links { display: flex; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
      .stat-value { font-size: 1.5rem; }
      .filter-buttons { gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="window.location.href='dashboard.html'">
        <div class="logo-icon"><i class="fas fa-tasks"></i></div>
        <span class="logo-text">TaskPay</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="tasks.html" class="nav-link">Tasks</a>
        <a href="surveys.html" class="nav-link">Surveys</a>
        <a href="profile.html" class="nav-link">Profile</a>
        <a href="history.html" class="nav-link active">History</a>
      </div>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar" onclick="window.location.href='profile.html'">U</div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon earnings"><i class="fas fa-dollar-sign fa-lg"></i></div><div class="stat-value" id="totalEarnings">$0</div><div class="stat-label">Total Earned</div></div>
      <div class="stat-card"><div class="stat-icon withdrawals"><i class="fas fa-arrow-down fa-lg"></i></div><div class="stat-value" id="totalWithdrawn">$0</div><div class="stat-label">Withdrawn</div></div>
      <div class="stat-card"><div class="stat-icon tasks"><i class="fas fa-check-circle fa-lg"></i></div><div class="stat-value" id="totalTransactions">0</div><div class="stat-label">Transactions</div></div>
    </div>

    <!-- Filter Section -->
    <div class="filter-section">
      <div class="filter-title">Filter</div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="earnings">Earnings</button>
        <button class="filter-btn" data-filter="withdrawals">Withdrawals</button>
        <button class="filter-btn" data-filter="task">Tasks</button>
        <button class="filter-btn" data-filter="survey">Surveys</button>
      </div>
      <div class="date-range">
        <div class="date-input"><label>From</label><input type="date" id="dateFrom"></div>
        <div class="date-input"><label>To</label><input type="date" id="dateTo"></div>
        <button class="reset-btn" id="resetFilters">Reset</button>
      </div>
    </div>

    <!-- Transactions Table -->
    <div class="transactions-card">
      <div class="card-header">
        <h2><i class="fas fa-history"></i> History</h2>
        <button class="export-btn" id="exportBtn"><i class="fas fa-download"></i> Export</button>
      </div>
      <div class="table-container">
        <table id="transactionsTable">
          <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="transactionsBody"><tr><td colspan="5"><div class="empty-state"><i class="fas fa-inbox"></i><h3>No transactions</h3><p>Complete tasks to see earnings</p></div></td></tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';
    
    let currentUser = null, allTransactions = [], filtered = [], currentFilter = 'all', currentPage = 1, itemsPerPage = 10;

    function checkAuth() { if (localStorage.getItem('taskpay_logged_in') !== 'true') { window.location.href = 'login.html'; return false; } currentUser = localStorage.getItem('taskpay_user_email'); loadData(); return true; }
    function loadData() {
      const key = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      const saved = localStorage.getItem(`taskpay_transactions_${key}`);
      if (saved) { allTransactions = JSON.parse(saved); }
      else {
        const tasks = parseInt(localStorage.getItem(`taskpay_tasks_done_${key}`) || '0');
        const surveys = parseInt(localStorage.getItem(`taskpay_surveys_done_${key}`) || '0');
        const t = [], titles = ["Rate App Icon", "Watch Preview", "Share Fact", "Weather Screenshot", "Voice Feedback", "Website Test", "Social Share", "Product Review"];
        const stitles = ["Coffee Habits", "Mobile Gaming", "Streaming Services", "Work Tools", "Snack Brands"];
        for (let i = 1; i <= tasks; i++) { let d = new Date(); d.setDate(d.getDate() - (tasks - i)); t.push({ id: `t_${i}`, date: d.toISOString().split('T')[0], type: 'task', category: 'earnings', description: titles[(i-1)%8], amount: [0.35,0.5,0.45,0.6,0.7,0.85,0.55,0.65][(i-1)%8], status: 'completed' }); }
        for (let i = 1; i <= surveys; i++) { let d = new Date(); d.setDate(d.getDate() - (surveys - i)); t.push({ id: `s_${i}`, date: d.toISOString().split('T')[0], type: 'survey', category: 'earnings', description: stitles[(i-1)%5], amount: [0.8,0.9,1.0,0.75,0.65][(i-1)%5], status: 'completed' }); }
        allTransactions = t.sort((a,b)=>new Date(b.date)-new Date(a.date));
        localStorage.setItem(`taskpay_transactions_${key}`, JSON.stringify(allTransactions));
      }
      const earnings = allTransactions.filter(t=>t.category==='earnings').reduce((s,t)=>s+t.amount,0);
      const withdrawn = allTransactions.filter(t=>t.category==='withdrawal' && t.status==='completed').reduce((s,t)=>s+t.amount,0);
      document.getElementById('totalEarnings').textContent = `$${earnings.toFixed(2)}`;
      document.getElementById('totalWithdrawn').textContent = `$${withdrawn.toFixed(2)}`;
      document.getElementById('totalTransactions').textContent = allTransactions.length;
      document.getElementById('userAvatar').textContent = currentUser.split('@')[0].charAt(0).toUpperCase();
      applyFilters();
    }
    function applyFilters() {
      let f = [...allTransactions];
      if (currentFilter !== 'all') {
        if (currentFilter === 'earnings') f = f.filter(t=>t.category==='earnings');
        else if (currentFilter === 'withdrawals') f = f.filter(t=>t.category==='withdrawal');
        else f = f.filter(t=>t.type===currentFilter);
      }
      const from = document.getElementById('dateFrom').value, to = document.getElementById('dateTo').value;
      if (from) f = f.filter(t=>t.date>=from);
      if (to) f = f.filter(t=>t.date<=to);
      filtered = f; currentPage=1; renderTable(); renderPages();
    }
    function renderTable() {
      const body = document.getElementById('transactionsBody');
      const start = (currentPage-1)*itemsPerPage, end = start+itemsPerPage;
      const pageData = filtered.slice(start,end);
      if (!pageData.length) { body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-inbox"></i><h3>No transactions</h3><p>Try different filters</p></div></td></tr>'; return; }
      body.innerHTML = pageData.map(t => `<tr><td>${new Date(t.date).toLocaleDateString()}</td><td><span class="badge ${t.type}">${t.type==='task'?'📋 Task':t.type==='survey'?'📊 Survey':'💸 Withdrawal'}</span></td><td>${t.description}</td><td class="${t.category==='earnings'?'amount-positive':'amount-negative'}">${t.category==='earnings'?'+':'-'}$${t.amount.toFixed(2)}</td><td><span class="badge ${t.status}">${t.status==='completed'?'✓ Completed':'⏳ Pending'}</span></td></tr>`).join('');
    }
    function renderPages() {
      const total = Math.ceil(filtered.length/itemsPerPage), div = document.getElementById('pagination');
      if (total<=1) { div.innerHTML=''; return; }
      let html='';
      for(let i=1;i<=Math.min(total,5);i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      div.innerHTML=html;
      document.querySelectorAll('.page-btn').forEach(b=>b.addEventListener('click',()=>{currentPage=parseInt(b.dataset.page);renderTable();renderPages();}));
    }
    function exportCSV() { if(!filtered.length) return showToast('No data to export'); const h=['Date','Type','Description','Amount','Status'], rows=filtered.map(t=>[t.date,t.type,t.description,`${t.category==='earnings'?'+':'-'}$${t.amount.toFixed(2)}`,t.status]); const csv=[h,...rows].map(r=>r.join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv])); a.download=`taskpay_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Exported!'); }
    function showToast(m) { const t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${m}`; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function logout() { localStorage.removeItem('taskpay_logged_in'); localStorage.removeItem('taskpay_user_email'); window.location.href='login.html'; }

    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(f=>f.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;applyFilters();}));
    document.getElementById('dateFrom').addEventListener('change',applyFilters);
    document.getElementById('dateTo').addEventListener('change',applyFilters);
    document.getElementById('resetFilters').addEventListener('click',()=>{document.getElementById('dateFrom').value='';document.getElementById('dateTo').value='';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');currentFilter='all';applyFilters();});
    document.getElementById('exportBtn').addEventListener('click',exportCSV);
    document.getElementById('logoutBtn').addEventListener('click',logout);
    if(checkAuth()){}
  </script>
</body>
</html>
