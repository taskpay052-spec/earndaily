<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Complete Task</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      min-height: 100vh;
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(16, 185, 129, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      color: white;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: #64748b;
      font-weight: 500;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #f1f5f9;
      color: #059669;
      transform: translateX(-5px);
    }

    /* Main Content */
    .main-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* Task Header */
    .task-header {
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1);
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .task-icon i {
      font-size: 40px;
      color: white;
    }

    .task-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #0f172a, #334155);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .task-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.5rem 1rem;
      background: #f8fafc;
      border-radius: 40px;
    }

    .meta-item i {
      color: #10b981;
    }

    .reward-badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.2rem;
    }

    /* Instructions Card */
    .instructions-card {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      transition: transform 0.3s;
    }

    .instructions-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      color: #10b981;
      font-size: 1.3rem;
    }

    .instructions-list {
      list-style: none;
      padding: 0;
    }

    .instructions-list li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      background: #f8fafc;
      border-radius: 16px;
      transition: all 0.3s;
    }

    .instructions-list li:hover {
      background: #f1f5f9;
      transform: translateX(8px);
    }

    .step-number {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Submission Form */
    .submission-card {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .form-label i {
      color: #10b981;
      margin-right: 8px;
    }

    .form-control {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .form-control:focus {
      outline: none;
      border-color: #10b981;
      background: white;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }

    /* File Upload */
    .file-upload {
      border: 2px dashed #e2e8f0;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .file-upload:hover {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .file-upload i {
      font-size: 48px;
      color: #10b981;
      margin-bottom: 1rem;
    }

    .file-upload p {
      color: #64748b;
      font-size: 0.875rem;
    }

    .file-input {
      display: none;
    }

    /* Rating Stars */
    .rating-stars {
      display: flex;
      gap: 0.5rem;
      font-size: 2rem;
      cursor: pointer;
    }

    .rating-stars i {
      color: #cbd5e1;
      transition: all 0.2s;
    }

    .rating-stars i:hover,
    .rating-stars i.active {
      color: #f59e0b;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Success Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      max-width: 500px;
      text-align: center;
      animation: modalSlideIn 0.4s ease;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-content i {
      font-size: 80px;
      color: #10b981;
      margin-bottom: 1rem;
    }

    .modal-content h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .modal-content p {
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    .modal-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      z-index: 1100;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }
      .task-title {
        font-size: 1.5rem;
      }
      .task-meta {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="navigateTo('dashboard')">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Tasks</span>
      </button>
    </div>
  </nav>

  <div class="main-container" id="taskDetailContainer">
    <div class="task-header" id="taskHeader">
      <!-- Dynamic content -->
    </div>

    <div class="instructions-card">
      <div class="section-title">
        <i class="fas fa-clipboard-list"></i>
        <span>Task Instructions</span>
      </div>
      <ul class="instructions-list" id="instructionsList"></ul>
    </div>

    <div class="submission-card">
      <div class="section-title">
        <i class="fas fa-pen-alt"></i>
        <span>Submit Your Work</span>
      </div>

      <form id="submissionForm">
        <div class="form-group" id="textInputGroup" style="display: none;">
          <label class="form-label">
            <i class="fas fa-comment"></i>
            Your Response
          </label>
          <textarea class="form-control" id="textResponse" rows="4" placeholder="Enter your response here..."></textarea>
        </div>

        <div class="form-group" id="ratingGroup" style="display: none;">
          <label class="form-label">
            <i class="fas fa-star"></i>
            Your Rating
          </label>
          <div class="rating-stars" id="ratingStars">
            <i class="far fa-star" data-rating="1"></i>
            <i class="far fa-star" data-rating="2"></i>
            <i class="far fa-star" data-rating="3"></i>
            <i class="far fa-star" data-rating="4"></i>
            <i class="far fa-star" data-rating="5"></i>
          </div>
        </div>

        <div class="form-group" id="fileUploadGroup" style="display: none;">
          <label class="form-label">
            <i class="fas fa-upload"></i>
            Upload File
          </label>
          <div class="file-upload" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Click to upload or drag and drop</p>
            <p style="font-size: 0.7rem; margin-top: 0.5rem;">PNG, JPG, PDF up to 5MB</p>
          </div>
          <input type="file" id="fileInput" class="file-input" accept="image/*,.pdf">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-check-circle"></i>
          Submit & Earn Reward
        </button>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <i class="fas fa-check-circle"></i>
      <h2>Task Completed! 🎉</h2>
      <p>Great job! Your submission has been received.</p>
      <p id="earnedAmount" style="color: #10b981; font-weight: 700; font-size: 1.2rem;"></p>
      <button class="modal-btn" onclick="closeModalAndReturn()">Return to Tasks</button>
    </div>
  </div>

  <script>
    let currentTask = null;
    let selectedRating = 0;

    function navigateTo(page) {
      const pages = {
        'dashboard': 'dashboard.html',
        'tasks': 'tasks.html'
      };
      window.location.href = pages[page] || 'dashboard.html';
    }

    function goBack() {
      window.location.href = 'tasks.html';
    }

    function loadTaskData() {
      const storedTask = sessionStorage.getItem('current_task');
      if (!storedTask) {
        showToast('No task found. Redirecting...');
        setTimeout(() => window.location.href = 'tasks.html', 1500);
        return;
      }

      currentTask = JSON.parse(storedTask);
      renderTaskDetails();
    }

    function renderTaskDetails() {
      // Header
      document.getElementById('taskHeader').innerHTML = `
        <div class="task-icon" style="background: linear-gradient(135deg, ${currentTask.color}99, ${currentTask.color});">
          <i class="fas ${currentTask.icon}"></i>
        </div>
        <h1 class="task-title">${currentTask.title}</h1>
        <p style="color: #64748b; margin-top: 0.5rem;">${currentTask.description}</p>
        <div class="task-meta">
          <div class="meta-item">
            <i class="fas fa-clock"></i>
            <span>${currentTask.timeEstimate}</span>
          </div>
          <div class="meta-item">
            <i class="fas fa-chart-line"></i>
            <span>${currentTask.difficulty?.toUpperCase() || 'EASY'}</span>
          </div>
          <div class="reward-badge">
            <i class="fas fa-dollar-sign"></i> ${currentTask.reward.toFixed(2)}
          </div>
        </div>
      `;

      // Instructions
      const instructions = currentTask.instructions || [
        "Read the task carefully",
        "Complete the required action",
        "Submit your response",
        "Earn your reward!"
      ];
      
      document.getElementById('instructionsList').innerHTML = instructions.map((instruction, index) => `
        <li>
          <div class="step-number">${index + 1}</div>
          <span>${instruction}</span>
        </li>
      `).join('');

      // Determine input type based on task
      setupFormByTaskType();
    }

    function setupFormByTaskType() {
      const title = currentTask.title.toLowerCase();
      
      // Hide all groups first
      document.getElementById('textInputGroup').style.display = 'none';
      document.getElementById('ratingGroup').style.display = 'none';
      document.getElementById('fileUploadGroup').style.display = 'none';
      
      // Show appropriate input based on task type
      if (title.includes('rating') || title.includes('rate') || title.includes('review')) {
        document.getElementById('ratingGroup').style.display = 'block';
        document.getElementById('textInputGroup').style.display = 'block';
      } 
      else if (title.includes('upload') || title.includes('screenshot') || title.includes('photo')) {
        document.getElementById('fileUploadGroup').style.display = 'block';
        document.getElementById('textInputGroup').style.display = 'block';
      }
      else if (title.includes('share') || title.includes('write') || title.includes('create')) {
        document.getElementById('textInputGroup').style.display = 'block';
      }
      else {
        document.getElementById('textInputGroup').style.display = 'block';
      }
      
      // Setup rating stars
      setupRatingStars();
    }

    function setupRatingStars() {
      const stars = document.querySelectorAll('#ratingStars i');
      stars.forEach(star => {
        star.addEventListener('click', () => {
          const rating = parseInt(star.dataset.rating);
          selectedRating = rating;
          stars.forEach(s => {
            const starRating = parseInt(s.dataset.rating);
            if (starRating <= rating) {
              s.className = 'fas fa-star';
              s.style.color = '#f59e0b';
            } else {
              s.className = 'far fa-star';
              s.style.color = '#cbd5e1';
            }
          });
        });
        
        star.addEventListener('mouseenter', () => {
          const rating = parseInt(star.dataset.rating);
          stars.forEach(s => {
            const starRating = parseInt(s.dataset.rating);
            if (starRating <= rating) {
              s.className = 'fas fa-star';
              s.style.color = '#fbbf24';
            }
          });
        });
        
        star.addEventListener('mouseleave', () => {
          stars.forEach(s => {
            const starRating = parseInt(s.dataset.rating);
            if (starRating <= selectedRating) {
              s.className = 'fas fa-star';
              s.style.color = '#f59e0b';
            } else {
              s.className = 'far fa-star';
              s.style.color = '#cbd5e1';
            }
          });
        });
      });
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function completeTask() {
      // Validate input based on task type
      const textResponse = document.getElementById('textResponse')?.value;
      const fileInput = document.getElementById('fileInput');
      const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
      
      const title = currentTask.title.toLowerCase();
      
      if (title.includes('rating') || title.includes('rate')) {
        if (selectedRating === 0) {
          showToast('Please select a rating!');
          return;
        }
        if (!textResponse || textResponse.trim().length < 5) {
          showToast('Please provide a detailed review (minimum 5 characters)!');
          return;
        }
      }
      
      if (title.includes('upload') || title.includes('screenshot') || title.includes('photo')) {
        if (!hasFile) {
          showToast('Please upload a file!');
          return;
        }
      }
      
      if (!title.includes('rating') && !title.includes('upload')) {
        if (!textResponse || textResponse.trim().length < 3) {
          showToast('Please provide a response!');
          return;
        }
      }
      
      // Save completion to localStorage
      const userKey = localStorage.getItem('taskpay_user_email')?.replace(/[^a-zA-Z0-9]/g, '_');
      if (userKey) {
        const completedTasks = JSON.parse(localStorage.getItem(`taskpay_completed_tasks_${userKey}`) || '[]');
        if (!completedTasks.includes(currentTask.id)) {
          completedTasks.push(currentTask.id);
          localStorage.setItem(`taskpay_completed_tasks_${userKey}`, JSON.stringify(completedTasks));
          
          // Update total earnings
          const currentEarnings = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
          const newEarnings = currentEarnings + currentTask.reward;
          localStorage.setItem(`taskpay_total_earned_${userKey}`, newEarnings.toFixed(2));
          
          // Update tasks done count
          const tasksDone = parseInt(localStorage.getItem(`taskpay_tasks_done_${userKey}`) || '0');
          localStorage.setItem(`taskpay_tasks_done_${userKey}`, (tasksDone + 1).toString());
        }
      }
      
      // Show success modal
      document.getElementById('earnedAmount').innerHTML = `+$${currentTask.reward.toFixed(2)} earned!`;
      document.getElementById('successModal').classList.add('active');
    }

    function closeModalAndReturn() {
      document.getElementById('successModal').classList.remove('active');
      window.location.href = 'tasks.html';
    }

    // File upload handler
    document.getElementById('fileInput')?.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        const fileName = e.target.files[0].name;
        const fileUploadDiv = document.querySelector('.file-upload');
        fileUploadDiv.innerHTML = `
          <i class="fas fa-check-circle"></i>
          <p>File selected: ${fileName}</p>
          <p style="font-size: 0.7rem; margin-top: 0.5rem;">Click to change file</p>
        `;
      }
    });

    // Form submission
    document.getElementById('submissionForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      completeTask();
    });

    // Initialize
    loadTaskData();
  </script>
</body>
</html>
