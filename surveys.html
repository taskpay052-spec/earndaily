<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Paid Surveys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      font-family: 'Inter', sans-serif;
      color: #0f172a;
    }

    /* Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      color: white;
      font-size: 16px;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6d28d9, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: none;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
    }

    /* Main Content */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6d28d9, #8b5cf6, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.8rem;
    }

    /* Stats Summary - 4 columns on mobile */
    .stats-summary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.2);
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.6rem;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .stats-summary-item .value {
      font-size: 1.1rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters - Horizontal Scroll */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.3rem;
      -webkit-overflow-scrolling: touch;
    }

    .category-filters::-webkit-scrollbar {
      height: 3px;
    }

    .category-filters::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .category-filters::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }

    .category-btn {
      padding: 0.45rem 0.9rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .category-btn i {
      font-size: 0.65rem;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 0.35rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Surveys Grid - 2 cards per row on mobile */
    .surveys-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .survey-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(139, 92, 246, 0.1);
      transition: all 0.3s;
      cursor: pointer;
    }

    .survey-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .survey-header {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      padding: 0.8rem;
      color: white;
      position: relative;
    }

    .survey-category {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .survey-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    .survey-description {
      font-size: 0.65rem;
      opacity: 0.9;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .survey-stats {
      display: flex;
      gap: 0.8rem;
      font-size: 0.55rem;
      opacity: 0.8;
    }

    .survey-content {
      padding: 0.8rem;
    }

    .reward-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .survey-reward {
      font-size: 1rem;
      font-weight: 800;
      color: #8b5cf6;
    }

    .survey-reward small {
      font-size: 0.6rem;
      font-weight: 500;
      color: #64748b;
    }

    .survey-time {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      color: #64748b;
      font-size: 0.65rem;
    }

    .survey-details {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.6rem;
      color: #64748b;
    }

    .detail-item i {
      width: 12px;
      font-size: 0.6rem;
      color: #8b5cf6;
    }

    .tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .tag {
      background: #f1f5f9;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.55rem;
      color: #475569;
    }

    .completion-progress {
      margin-top: 0.5rem;
      height: 3px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #6d28d9);
      border-radius: 2px;
    }

    .survey-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #10b981;
      font-weight: 600;
      font-size: 0.65rem;
    }

    .start-btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      border: none;
      padding: 0.35rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Badges */
    .popular-badge, .new-badge, .trending-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      font-weight: 700;
      z-index: 1;
    }

    .popular-badge {
      background: linear-gradient(135deg, #f59e0b, #dc2626);
      color: white;
    }

    .new-badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .trending-badge {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      grid-column: span 2;
    }

    .empty-state i {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .empty-state h3 {
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .empty-state p {
      font-size: 0.75rem;
      color: #64748b;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      z-index: 1000;
      white-space: nowrap;
    }

    /* Tablet & Desktop */
    @media (min-width: 768px) {
      .main-container {
        padding: 2rem;
      }
      .nav-links {
        display: flex;
      }
      .surveys-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
      .page-header h1 {
        font-size: 2rem;
      }
      .stats-summary .label {
        font-size: 0.75rem;
      }
      .stats-summary .value {
        font-size: 1.5rem;
      }
    }

    @media (min-width: 1024px) {
      .surveys-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="navigateTo('dashboard')">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      <div class="nav-links">
        <a class="nav-link" onclick="navigateTo('dashboard')">Dashboard</a>
        <a class="nav-link" onclick="navigateTo('tasks')">Tasks</a>
        <a class="nav-link active" onclick="navigateTo('surveys')">Surveys</a>
        <a class="nav-link" onclick="navigateTo('withdrawals')">Withdraw</a>
        <a class="nav-link" onclick="navigateTo('profile')">Profile</a>
      </div>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar" onclick="navigateTo('profile')">U</div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="page-header">
      <h1>📊 Premium Surveys</h1>
      <p>Share opinions & earn money</p>
    </div>

    <div class="stats-summary" id="statsSummary">
      <div class="stats-summary-item">
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Earned</div>
        <div class="value" id="surveysEarned">$0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available</div>
        <div class="value" id="availableCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Streak</div>
        <div class="value" id="surveyStreak">0</div>
      </div>
    </div>

    <div class="category-filters" id="categoryFilters"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest</button>
      <button class="filter-btn" data-filter="short">Shortest</button>
    </div>

    <div id="surveysContainer" class="surveys-grid"></div>
  </div>

  <script>
    // Navigation function
    function navigateTo(page) {
      const pages = {
        'dashboard': 'dashboard.html',
        'tasks': 'tasks.html',
        'surveys': 'surveys.html',
        'withdrawals': 'withdrawal.html',
        'profile': 'profile.html'
      };
      const pageUrl = pages[page];
      if (pageUrl) window.location.href = pageUrl;
      else showToast('Page coming soon!');
    }

    // Survey Data
    const allSurveys = [
      { id: "s1", title: "☕ Coffee Habits", reward: 0.80, time: "3 min", q: 3, cat: "consumer", tags: ["Coffee"], popular: true, company: "Starbucks", icon: "fa-mug-hot", color: "#f59e0b", rate: 87 },
      { id: "s2", title: "🎮 Mobile Gaming", reward: 0.90, time: "4 min", q: 4, cat: "tech", tags: ["Gaming"], popular: true, company: "GameDev", icon: "fa-gamepad", color: "#8b5cf6", rate: 92 },
      { id: "s3", title: "📺 Streaming", reward: 1.00, time: "5 min", q: 5, cat: "tech", tags: ["Streaming"], popular: true, company: "Media", icon: "fa-tv", color: "#ec489a", rate: 78 },
      { id: "s4", title: "💻 WFH Tools", reward: 0.75, time: "3 min", q: 3, cat: "business", tags: ["Work"], company: "TechCorp", icon: "fa-laptop-code", color: "#06b6d4", rate: 85 },
      { id: "s5", title: "🍪 Snack Brands", reward: 0.65, time: "2 min", q: 2, cat: "consumer", tags: ["Food"], new: true, company: "SnackCo", icon: "fa-cookie-bite", color: "#f59e0b", rate: 95 },
      { id: "s6", title: "🏃 Fitness", reward: 0.95, time: "4 min", q: 4, cat: "health", tags: ["Fitness"], trending: true, company: "Wellness", icon: "fa-heartbeat", color: "#10b981", rate: 88 },
      { id: "s7", title: "🛍️ Online Shopping", reward: 0.85, time: "4 min", q: 4, cat: "consumer", tags: ["Shopping"], popular: true, company: "Retail", icon: "fa-shopping-cart", color: "#ef4444", rate: 82 },
      { id: "s8", title: "📱 Social Media", reward: 0.70, time: "3 min", q: 3, cat: "tech", tags: ["Social"], company: "SocialInsights", icon: "fa-hashtag", color: "#3b82f6", rate: 90 },
      { id: "s9", title: "🚗 Electric Vehicles", reward: 1.20, time: "6 min", q: 6, cat: "business", tags: ["EV"], new: true, company: "Auto", icon: "fa-car", color: "#06b6d4", rate: 75 },
      { id: "s10", title: "💳 Digital Banking", reward: 1.10, time: "5 min", q: 5, cat: "business", tags: ["Banking"], popular: true, company: "FinTech", icon: "fa-credit-card", color: "#8b5cf6", rate: 79 }
    ];

    let surveys = [], currentUser = null, completed = [], currentFilter = 'all', currentCat = 'all', earned = 0, streak = 0;

    function checkAuth() {
      if (localStorage.getItem('taskpay_logged_in') !== 'true') { window.location.href = 'login.html'; return false; }
      currentUser = localStorage.getItem('taskpay_user_email') || 'user@taskpay.com';
      loadData();
      return true;
    }

    function loadData() {
      const key = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completed = JSON.parse(localStorage.getItem(`taskpay_completed_surveys_${key}`) || '[]');
      earned = 0;
      surveys = allSurveys.map(s => { const c = completed.includes(s.id); if (c) earned += s.reward; return { ...s, completed: c }; });
      streak = Math.floor(Math.random() * 14) + 1;
      updateStats();
      renderCats();
      render();
      document.getElementById('userAvatar').textContent = currentUser.split('@')[0].charAt(0).toUpperCase();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = surveys.filter(s => s.completed).length;
      document.getElementById('availableCount').textContent = surveys.filter(s => !s.completed).length;
      document.getElementById('surveysEarned').textContent = `$${earned.toFixed(2)}`;
      document.getElementById('surveyStreak').textContent = streak;
    }

    function renderCats() {
      const cats = [
        { id: 'all', name: 'All', icon: 'fa-th-large' },
        { id: 'consumer', name: '🛍️ Consumer', icon: 'fa-users' },
        { id: 'tech', name: '💻 Tech', icon: 'fa-gamepad' },
        { id: 'business', name: '📊 Business', icon: 'fa-chart-line' },
        { id: 'health', name: '🏃 Health', icon: 'fa-heartbeat' }
      ];
      document.getElementById('categoryFilters').innerHTML = cats.map(c => `<button class="category-btn ${currentCat === c.id ? 'active' : ''}" data-cat="${c.id}"><i class="fas ${c.icon}"></i><span>${c.name}</span></button>`).join('');
      document.querySelectorAll('.category-btn').forEach(b => b.addEventListener('click', () => { currentCat = b.dataset.cat; renderCats(); render(); }));
    }

    function render() {
      let filtered = surveys.filter(s => currentCat === 'all' || s.cat === currentCat);
      if (currentFilter === 'available') filtered = filtered.filter(s => !s.completed);
      else if (currentFilter === 'completed') filtered = filtered.filter(s => s.completed);
      else if (currentFilter === 'highest') filtered.sort((a, b) => b.reward - a.reward);
      else if (currentFilter === 'short') filtered.sort((a, b) => a.q - b.q);
      
      const cont = document.getElementById('surveysContainer');
      if (!filtered.length) { cont.innerHTML = `<div class="empty-state"><i class="fas fa-poll"></i><h3>No surveys</h3><p>Check back later!</p></div>`; return; }
      
      cont.innerHTML = filtered.map(s => `
        <div class="survey-card">
          <div class="survey-header" style="background:linear-gradient(135deg, ${s.color}, ${s.color}dd);">
            ${s.popular ? '<div class="popular-badge"><i class="fas fa-fire"></i> Popular</div>' : ''}
            ${s.new ? '<div class="new-badge"><i class="fas fa-star"></i> New</div>' : ''}
            <div class="survey-category"><i class="fas ${s.icon}"></i> ${s.cat.toUpperCase()}</div>
            <h3 class="survey-title">${s.title}</h3>
            <p class="survey-description">${s.description}</p>
            <div class="survey-stats"><span><i class="far fa-clock"></i> ${s.time}</span><span><i class="far fa-question-circle"></i> ${s.q} q</span></div>
          </div>
          <div class="survey-content">
            <div class="reward-section">
              <div class="survey-reward">$${s.reward.toFixed(2)} <small>USD</small></div>
              <div class="survey-time"><i class="fas fa-hourglass-half"></i> ${s.time}</div>
            </div>
            <div class="survey-details">
              <div class="detail-item"><i class="fas fa-building"></i> ${s.company}</div>
              <div class="detail-item"><i class="fas fa-chart-line"></i> ${s.rate}%</div>
            </div>
            <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="completion-progress"><div class="progress-fill" style="width:${s.rate}%"></div></div>
            <div class="survey-footer">
              ${s.completed ? `<div class="completed-badge"><i class="fas fa-check-circle"></i> Completed</div>` : `<button class="start-btn" onclick="startSurvey('${s.id}')"><i class="fas fa-play"></i> Take</button>`}
            </div>
          </div>
        </div>
      `).join('');
    }

    function startSurvey(id) {
      const s = surveys.find(s => s.id === id);
      if (s.completed) return showToast('Already completed!');
      sessionStorage.setItem('current_survey', JSON.stringify(s));
      showToast('Loading...');
      setTimeout(() => window.location.href = `survey-detail.html?id=${id}`, 300);
    }

    function showToast(m) { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="fas fa-check-circle"></i> ${m}`; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function logout() { if (confirm('Logout?')) { localStorage.removeItem('taskpay_logged_in'); localStorage.removeItem('taskpay_user_email'); window.location.href = 'login.html'; } }

    window.navigateTo = navigateTo; window.startSurvey = startSurvey;
    document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(f => f.classList.remove('active')); b.classList.add('active'); currentFilter = b.dataset.filter; render(); }));
    document.getElementById('logoutBtn').addEventListener('click', logout);
    if (checkAuth()) {}
  </script>
</body>
</html>
