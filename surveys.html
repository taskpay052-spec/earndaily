<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Paid Surveys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Inter', sans-serif;
      color: #1a1f36;
      overflow-x: hidden;
    }

    /* Premium Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      transition: all 0.3s;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }

    .logo-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      color: #94a3b8;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
    }

    .nav-item span {
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .menu-left {
      display: flex;
      align-items: center;
    }

    .menu-toggle {
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notification-bell {
      position: relative;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .notification-bell i {
      font-size: 1.2rem;
      color: #64748b;
    }

    .notification-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .user-info {
      display: none;
    }

    .user-info h4 {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .user-info p {
      font-size: 0.65rem;
      color: #64748b;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    /* Main Content */
    .main-content {
      margin-left: 0;
      padding: 1rem;
      transition: margin-left 0.3s;
    }

    /* Stats Summary */
    .stats-summary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.6rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.1rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      padding-bottom: 0.3rem;
    }

    .category-btn {
      padding: 0.45rem 0.9rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.35rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Surveys Grid */
    .surveys-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    .survey-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .survey-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-color: #8b5cf6;
    }

    .survey-header {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      padding: 0.8rem;
      color: white;
      position: relative;
    }

    .survey-category {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      margin-bottom: 0.5rem;
    }

    .survey-title {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .survey-content {
      padding: 0.8rem;
    }

    .reward-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .survey-reward {
      font-size: 1rem;
      font-weight: 800;
      color: #8b5cf6;
    }

    .start-btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      border: none;
      padding: 0.35rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.65rem;
      cursor: pointer;
    }

    .completed-badge {
      color: #10b981;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .popular-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: linear-gradient(135deg, #f59e0b, #dc2626);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      color: white;
    }

    /* Survey Modal - Stunning Design */
    .survey-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-container {
      background: white;
      border-radius: 40px;
      max-width: 550px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 2px solid #f1f5f9;
      position: sticky;
      top: 0;
      background: white;
      z-index: 10;
      border-radius: 40px 40px 0 0;
    }

    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: #e2e8f0;
      transform: rotate(90deg);
    }

    /* Progress Bar */
    .progress-section {
      padding: 1rem 1.5rem;
      background: #f8fafc;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .progress-bar-bg {
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #6d28d9);
      border-radius: 10px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Question Area */
    .question-area {
      padding: 1.5rem;
      min-height: 280px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .option:hover {
      background: #f1f5f9;
      transform: translateX(5px);
    }

    .option.selected {
      background: linear-gradient(135deg, #f5f3ff, #ede9fe);
      border-color: #8b5cf6;
    }

    .option input {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #8b5cf6;
    }

    .option label {
      flex: 1;
      cursor: pointer;
      font-size: 0.9rem;
      color: #334155;
    }

    /* Navigation Buttons */
    .modal-footer {
      padding: 1rem 1.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid #f1f5f9;
    }

    .nav-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .nav-btn.prev {
      background: #f1f5f9;
      color: #475569;
    }

    .nav-btn.prev:hover {
      background: #e2e8f0;
    }

    .nav-btn.next, .nav-btn.submit {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      flex: 1;
    }

    .nav-btn.next:hover, .nav-btn.submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    /* Reward Animation */
    .reward-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1rem 2rem;
      border-radius: 60px;
      font-size: 1.5rem;
      font-weight: 800;
      z-index: 2100;
      animation: floatUp 0.8s ease forwards;
      white-space: nowrap;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      80% {
        opacity: 1;
        transform: translate(-50%, -80px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -120px) scale(0.8);
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      z-index: 1000;
    }

    @media (min-width: 768px) {
      .sidebar {
        transform: translateX(0);
      }
      .top-bar {
        justify-content: flex-end;
      }
      .menu-left {
        display: none;
      }
      .user-info {
        display: block;
      }
      .main-content {
        margin-left: 280px;
        padding: 2rem;
      }
      .surveys-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .surveys-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="menu-left">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    <div class="user-section">
      <div class="notification-bell" onclick="showToast('No new notifications')">
        <i class="far fa-bell"></i>
        <div class="notification-dot"></div>
      </div>
      <div class="user-card" onclick="navigateTo('profile')">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <h4 id="userName">Loading...</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <div><div class="logo-text">TaskPay</div><div class="logo-badge">Premium Dashboard</div></div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" onclick="navigateTo('dashboard')"><i class="fas fa-home"></i><span>Dashboard</span></div>
      <div class="nav-item" onclick="navigateTo('tasks')"><i class="fas fa-tasks"></i><span>My Tasks</span></div>
      <div class="nav-item active" onclick="navigateTo('surveys')"><i class="fas fa-poll"></i><span>Surveys</span></div>
      <div class="nav-item" onclick="navigateTo('withdrawals')"><i class="fas fa-wallet"></i><span>Withdrawals</span></div>
      <div class="nav-item" onclick="navigateTo('profile')"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="stats-summary">
      <div class="stats-summary-item"><div class="label">Completed</div><div class="value" id="completedCount">0</div></div>
      <div class="stats-summary-item"><div class="label">Earned</div><div class="value" id="surveysEarned">$0</div></div>
      <div class="stats-summary-item"><div class="label">Available</div><div class="value" id="availableCount">0</div></div>
      <div class="stats-summary-item"><div class="label">Streak</div><div class="value" id="surveyStreak">0</div></div>
    </div>

    <div class="category-filters" id="categoryFilters"></div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest</button>
    </div>
    <div id="surveysContainer" class="surveys-grid"></div>
  </div>

  <!-- Survey Modal -->
  <div id="surveyModal" class="survey-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">Take Survey</h2>
        <button class="modal-close" onclick="closeSurveyModal()">&times;</button>
      </div>
      <div class="progress-section">
        <div class="progress-text">
          <span id="questionCounter">Question 1 of 3</span>
          <span id="rewardDisplay">+$0.00</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="question-area" id="questionArea"></div>
      <div class="modal-footer">
        <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()">← Previous</button>
        <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">Next →</button>
        <button class="nav-btn submit" id="submitBtn" onclick="submitSurvey()" style="display:none;">Complete & Earn →</button>
      </div>
    </div>
  </div>

  <script>
    // Survey Data with Questions
    const allSurveys = [
      { id: "s1", title: "☕ Coffee Habits", reward: 0.80, time: "3 min", q: 3, cat: "consumer", company: "Starbucks", icon: "fa-mug-hot", color: "#f59e0b", popular: true,
        questions: [
          { text: "How often do you visit coffee shops?", options: ["Daily", "2-3 times a week", "Once a week", "Few times a month", "Rarely"] },
          { text: "What's your favorite coffee drink?", options: ["Espresso", "Latte", "Cappuccino", "Americano", "Cold brew"] },
          { text: "How much do you typically spend per visit?", options: ["Under $3", "$3-$5", "$5-$7", "$7-$10", "Over $10"] }
        ] },
      { id: "s2", title: "🎮 Mobile Gaming", reward: 0.90, time: "4 min", q: 4, cat: "tech", company: "GameDev", icon: "fa-gamepad", color: "#8b5cf6", popular: true,
        questions: [
          { text: "How many hours per week do you play mobile games?", options: ["0-2 hours", "3-5 hours", "6-10 hours", "11-15 hours", "15+ hours"] },
          { text: "What's your favorite game genre?", options: ["Puzzle", "Action", "Strategy", "RPG", "Casual"] },
          { text: "Do you make in-app purchases?", options: ["Never", "Rarely", "Sometimes", "Often", "Always"] },
          { text: "What makes you download a new game?", options: ["Ads", "Friend recommendations", "App store ratings", "Social media"] }
        ] },
      { id: "s3", title: "📺 Streaming Services", reward: 1.00, time: "5 min", q: 5, cat: "tech", company: "Media", icon: "fa-tv", color: "#ec489a", popular: true,
        questions: [
          { text: "Which streaming services do you use?", options: ["Netflix", "Disney+", "Hulu", "Amazon Prime", "HBO Max"], multiSelect: true },
          { text: "How much do you spend monthly on streaming?", options: ["Under $20", "$20-$40", "$40-$60", "$60-$80", "Over $80"] },
          { text: "What type of content do you watch most?", options: ["Movies", "TV Shows", "Documentaries", "Anime", "News"] },
          { text: "How satisfied are you with your current services?", options: ["Very satisfied", "Satisfied", "Neutral", "Unsatisfied"] },
          { text: "Would you try a new streaming service?", options: ["Definitely yes", "Probably yes", "Not sure", "Probably no"] }
        ] },
      { id: "s4", title: "💻 WFH Tools", reward: 0.75, time: "3 min", q: 3, cat: "business", company: "TechCorp", icon: "fa-laptop-code", color: "#06b6d4",
        questions: [
          { text: "What tools do you use for work?", options: ["Zoom", "Slack", "Teams", "Google Workspace", "Notion"] },
          { text: "How productive do you feel working from home?", options: ["Very productive", "Productive", "Neutral", "Unproductive"] },
          { text: "What would improve your WFH experience?", options: ["Better equipment", "More breaks", "Flexible hours", "Better communication"] }
        ] }
    ];

    let surveys = [], currentUser = null, completed = [], currentFilter = 'all', currentCat = 'all', earned = 0, streak = 0;
    let currentSurvey = null, currentAnswers = [], currentQuestionIndex = 0;

    function navigateTo(page) {
      const pages = { 'dashboard': 'dashboard.html', 'tasks': 'tasks.html', 'surveys': 'surveys.html', 'withdrawals': 'withdrawal.html', 'profile': 'profile.html' };
      window.location.href = pages[page] || '#';
    }

    function checkAuth() {
      if (localStorage.getItem('taskpay_logged_in') !== 'true') { window.location.href = 'login.html'; return false; }
      currentUser = localStorage.getItem('taskpay_user_email') || 'user@taskpay.com';
      loadData();
      return true;
    }

    function loadData() {
      const key = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completed = JSON.parse(localStorage.getItem(`taskpay_completed_surveys_${key}`) || '[]');
      earned = 0;
      surveys = allSurveys.map(s => { const c = completed.includes(s.id); if (c) earned += s.reward; return { ...s, completed: c }; });
      streak = Math.floor(Math.random() * 14) + 1;
      document.getElementById('userName').textContent = currentUser.split('@')[0];
      document.getElementById('userEmail').textContent = currentUser;
      document.getElementById('userAvatar').textContent = currentUser.split('@')[0].charAt(0).toUpperCase();
      updateStats();
      renderCats();
      render();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = surveys.filter(s => s.completed).length;
      document.getElementById('availableCount').textContent = surveys.filter(s => !s.completed).length;
      document.getElementById('surveysEarned').textContent = `$${earned.toFixed(2)}`;
      document.getElementById('surveyStreak').textContent = streak;
    }

    function renderCats() {
      const cats = [{ id: 'all', name: 'All' }, { id: 'consumer', name: '🛍️ Consumer' }, { id: 'tech', name: '💻 Tech' }, { id: 'business', name: '📊 Business' }];
      document.getElementById('categoryFilters').innerHTML = cats.map(c => `<button class="category-btn ${currentCat === c.id ? 'active' : ''}" data-cat="${c.id}">${c.name}</button>`).join('');
      document.querySelectorAll('.category-btn').forEach(b => b.addEventListener('click', () => { currentCat = b.dataset.cat; renderCats(); render(); }));
    }

    function render() {
      let filtered = surveys.filter(s => currentCat === 'all' || s.cat === currentCat);
      if (currentFilter === 'available') filtered = filtered.filter(s => !s.completed);
      else if (currentFilter === 'completed') filtered = filtered.filter(s => s.completed);
      else if (currentFilter === 'highest') filtered.sort((a, b) => b.reward - a.reward);
      const container = document.getElementById('surveysContainer');
      if (!filtered.length) { container.innerHTML = `<div class="empty-state" style="text-align:center;padding:2rem;"><i class="fas fa-poll"></i><p>No surveys</p></div>`; return; }
      container.innerHTML = filtered.map(s => `
        <div class="survey-card" onclick="openSurveyModal('${s.id}')">
          <div class="survey-header" style="background:linear-gradient(135deg, ${s.color}, ${s.color}dd);">
            ${s.popular ? '<div class="popular-badge"><i class="fas fa-fire"></i> Popular</div>' : ''}
            <div class="survey-category"><i class="fas ${s.icon}"></i> ${s.cat.toUpperCase()}</div>
            <h3 class="survey-title">${s.title}</h3>
          </div>
          <div class="survey-content">
            <div class="reward-section"><div class="survey-reward">$${s.reward.toFixed(2)}</div></div>
            <div class="survey-footer">${s.completed ? '<div class="completed-badge"><i class="fas fa-check-circle"></i> Completed</div>' : '<button class="start-btn" onclick="event.stopPropagation(); openSurveyModal(\'' + s.id + '\')">Take Survey →</button>'}</div>
          </div>
        </div>
      `).join('');
    }

    function openSurveyModal(surveyId) {
      const survey = surveys.find(s => s.id === surveyId);
      if (survey.completed) { showToast('Already completed!'); return; }
      currentSurvey = survey;
      currentAnswers = new Array(survey.questions.length).fill(null).map(() => []);
      currentQuestionIndex = 0;
      document.getElementById('modalTitle').innerHTML = `<i class="fas ${survey.icon}"></i> ${survey.title}`;
      document.getElementById('rewardDisplay').innerHTML = `+$${survey.reward.toFixed(2)}`;
      renderQuestion();
      document.getElementById('surveyModal').style.display = 'flex';
    }

    function renderQuestion() {
      const q = currentSurvey.questions[currentQuestionIndex];
      const isMulti = q.multiSelect;
      const currentAnswer = currentAnswers[currentQuestionIndex] || [];
      
      document.getElementById('questionCounter').innerHTML = `Question ${currentQuestionIndex + 1} of ${currentSurvey.questions.length}`;
      document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / currentSurvey.questions.length) * 100}%`;
      
      document.getElementById('questionArea').innerHTML = `
        <div class="question-text">${currentQuestionIndex + 1}. ${q.text}</div>
        <div class="options">
          ${q.options.map((opt, idx) => `
            <div class="option ${currentAnswer.includes(opt) ? 'selected' : ''}" onclick="selectOption(${idx}, '${opt.replace(/'/g, "\\'")}')">
              <input type="${isMulti ? 'checkbox' : 'radio'}" name="question" value="${opt}" ${currentAnswer.includes(opt) ? 'checked' : ''}>
              <label>${opt}</label>
            </div>
          `).join('')}
        </div>
      `;
      
      const isLast = currentQuestionIndex === currentSurvey.questions.length - 1;
      document.getElementById('nextBtn').style.display = isLast ? 'none' : 'flex';
      document.getElementById('submitBtn').style.display = isLast ? 'flex' : 'none';
    }

    function selectOption(idx, value) {
      const q = currentSurvey.questions[currentQuestionIndex];
      const isMulti = q.multiSelect;
      const optionDivs = document.querySelectorAll('.option');
      
      if (isMulti) {
        let current = currentAnswers[currentQuestionIndex] || [];
        if (current.includes(value)) {
          current = current.filter(v => v !== value);
        } else {
          current.push(value);
        }
        currentAnswers[currentQuestionIndex] = current;
        optionDivs.forEach(div => {
          if (div.querySelector('label').innerText === value) {
            div.classList.toggle('selected');
          }
        });
      } else {
        currentAnswers[currentQuestionIndex] = [value];
        optionDivs.forEach(div => div.classList.remove('selected'));
        optionDivs[idx].classList.add('selected');
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(r => r.checked = false);
        optionDivs[idx].querySelector('input').checked = true;
      }
    }

    function nextQuestion() {
      if (!currentAnswers[currentQuestionIndex] || currentAnswers[currentQuestionIndex].length === 0) {
        showToast('Please select an answer before continuing');
        return;
      }
      currentQuestionIndex++;
      renderQuestion();
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function submitSurvey() {
      if (!currentAnswers[currentQuestionIndex] || currentAnswers[currentQuestionIndex].length === 0) {
        showToast('Please answer the final question');
        return;
      }
      
      const key = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completed.push(currentSurvey.id);
      localStorage.setItem(`taskpay_completed_surveys_${key}`, JSON.stringify(completed));
      
      let balance = parseFloat(localStorage.getItem(`taskpay_balance_${key}`) || '0');
      let totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${key}`) || '0');
      let surveysDone = parseInt(localStorage.getItem(`taskpay_surveys_done_${key}`) || '0');
      
      balance += currentSurvey.reward;
      totalEarned += currentSurvey.reward;
      surveysDone += 1;
      
      localStorage.setItem(`taskpay_balance_${key}`, balance.toFixed(2));
      localStorage.setItem(`taskpay_total_earned_${key}`, totalEarned.toFixed(2));
      localStorage.setItem(`taskpay_surveys_done_${key}`, surveysDone);
      
      earned += currentSurvey.reward;
      currentSurvey.completed = true;
      
      closeSurveyModal();
      updateStats();
      render();
      
      showRewardAnimation(currentSurvey.reward);
      showToast(`🎉 Survey completed! +$${currentSurvey.reward.toFixed(2)} earned!`);
    }

    function showRewardAnimation(amount) {
      const anim = document.createElement('div');
      anim.className = 'reward-animation';
      anim.innerHTML = `+$${amount.toFixed(2)} 🎉`;
      document.body.appendChild(anim);
      setTimeout(() => anim.remove(), 800);
    }

    function closeSurveyModal() {
      document.getElementById('surveyModal').style.display = 'none';
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
      document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
    }

    function logout() { if (confirm('Logout?')) { localStorage.removeItem('taskpay_logged_in'); localStorage.removeItem('taskpay_user_email'); window.location.href = 'login.html'; } }

    document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(f => f.classList.remove('active')); b.classList.add('active'); currentFilter = b.dataset.filter; render(); }));
    document.getElementById('logoutBtn').addEventListener('click', logout);
    
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    document.addEventListener('click', (e) => { if (window.innerWidth < 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) sidebar.classList.remove('open'); });
    
    window.openSurveyModal = openSurveyModal;
    window.closeSurveyModal = closeSurveyModal;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    window.submitSurvey = submitSurvey;
    window.selectOption = selectOption;
    window.navigateTo = navigateTo;
    
    if (checkAuth()) {}
  </script>
</body>
</html>
