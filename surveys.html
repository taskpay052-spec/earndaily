<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>TaskPay · Premium Paid Surveys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Inter', sans-serif;
      color: #1a1f36;
      overflow-x: hidden;
    }

    /* Premium Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      transition: all 0.3s;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }

    .logo-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      color: #94a3b8;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
    }

    .nav-item span {
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    /* Top Bar - Fixed Layout */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    /* Left side - Menu Button */
    .menu-left {
      display: flex;
      align-items: center;
    }

    .menu-toggle {
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .menu-toggle:hover {
      background: #f1f5f9;
    }

    /* Right side - User Section */
    .user-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notification-bell {
      position: relative;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .notification-bell:hover {
      background: #f1f5f9;
    }

    .notification-bell i {
      font-size: 1.2rem;
      color: #64748b;
    }

    .notification-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-card:hover {
      background: #f1f5f9;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .user-info {
      display: none;
    }

    .user-info h4 {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .user-info p {
      font-size: 0.65rem;
      color: #64748b;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    /* Main Content */
    .main-content {
      margin-left: 0;
      padding: 1rem;
      transition: margin-left 0.3s;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 1.2rem;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.8rem;
    }

    /* Stats Summary - 4 columns */
    .stats-summary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.2);
    }

    .stats-summary-item {
      color: white;
      text-align: center;
    }

    .stats-summary-item .label {
      font-size: 0.6rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.1rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
      padding-bottom: 0.3rem;
      scrollbar-width: thin;
    }

    .category-filters::-webkit-scrollbar {
      height: 3px;
    }

    .category-filters::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .category-filters::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }

    .category-btn {
      padding: 0.45rem 0.9rem;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.35rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #8b5cf6;
      color: white;
    }

    /* Surveys Grid */
    .surveys-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .survey-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .survey-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-color: #8b5cf6;
    }

    .survey-header {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      padding: 0.8rem;
      color: white;
      position: relative;
    }

    .survey-category {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .survey-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .survey-description {
      font-size: 0.65rem;
      opacity: 0.9;
      margin-bottom: 0.5rem;
    }

    .survey-stats {
      display: flex;
      gap: 0.8rem;
      font-size: 0.55rem;
      opacity: 0.8;
    }

    .survey-content {
      padding: 0.8rem;
    }

    .reward-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .survey-reward {
      font-size: 1rem;
      font-weight: 800;
      color: #8b5cf6;
    }

    .survey-reward small {
      font-size: 0.6rem;
      font-weight: 500;
      color: #64748b;
    }

    .survey-time {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      color: #64748b;
      font-size: 0.65rem;
    }

    .survey-details {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.6rem;
      color: #64748b;
    }

    .detail-item i {
      color: #8b5cf6;
    }

    .tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .tag {
      background: #f1f5f9;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.55rem;
      color: #475569;
    }

    .completion-progress {
      margin-top: 0.5rem;
      height: 3px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #6d28d9);
      border-radius: 2px;
    }

    .survey-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #10b981;
      font-weight: 600;
      font-size: 0.65rem;
    }

    .start-btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      border: none;
      padding: 0.35rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .popular-badge, .new-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.55rem;
      font-weight: 700;
    }

    .popular-badge {
      background: linear-gradient(135deg, #f59e0b, #dc2626);
      color: white;
    }

    .new-badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      grid-column: span 2;
    }

    .empty-state i {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      z-index: 1000;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .sidebar {
        transform: translateX(0);
      }
      
      .top-bar {
        justify-content: flex-end;
      }
      
      .menu-left {
        display: none;
      }
      
      .user-info {
        display: block;
      }
      
      .main-content {
        margin-left: 280px;
        padding: 2rem;
      }
      
      .surveys-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
      
      .stats-summary .label {
        font-size: 0.75rem;
      }
      
      .stats-summary .value {
        font-size: 1.5rem;
      }
    }

    @media (min-width: 1024px) {
      .surveys-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Top Bar with Hamburger Menu and User Section -->
  <div class="top-bar">
    <div class="menu-left">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    <div class="user-section">
      <div class="notification-bell" onclick="showToast('No new notifications')">
        <i class="far fa-bell"></i>
        <div class="notification-dot"></div>
      </div>
      <div class="user-card" onclick="navigateTo('profile')">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <h4 id="userName">Loading...</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <!-- Premium Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <div>
          <div class="logo-text">TaskPay</div>
          <div class="logo-badge">Premium Dashboard</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" onclick="navigateTo('dashboard')">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" onclick="navigateTo('tasks')">
        <i class="fas fa-tasks"></i>
        <span>My Tasks</span>
      </div>
      <div class="nav-item active" onclick="navigateTo('surveys')">
        <i class="fas fa-poll"></i>
        <span>Surveys</span>
      </div>
      <div class="nav-item" onclick="navigateTo('withdrawals')">
        <i class="fas fa-wallet"></i>
        <span>Withdrawals</span>
      </div>
      <div class="nav-item" onclick="navigateTo('profile')">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </div>
      <div class="nav-item" onclick="navigateTo('support')">
        <i class="fas fa-headset"></i>
        <span>Support</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <h1>📊 Premium Surveys</h1>
      <p>Share your opinion & earn real money</p>
    </div>

    <div class="stats-summary">
      <div class="stats-summary-item">
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Earned</div>
        <div class="value" id="surveysEarned">$0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available</div>
        <div class="value" id="availableCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Streak</div>
        <div class="value" id="surveyStreak">0</div>
      </div>
    </div>

    <div class="category-filters" id="categoryFilters"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest</button>
      <button class="filter-btn" data-filter="short">Shortest</button>
    </div>

    <div id="surveysContainer" class="surveys-grid"></div>
  </div>

  <script>
    // Navigation function
    function navigateTo(page) {
      const pages = {
        'dashboard': 'dashboard.html',
        'tasks': 'tasks.html',
        'surveys': 'surveys.html',
        'withdrawals': 'withdrawal.html',
        'profile': 'profile.html',
        'support': 'support.html'
      };
      const pageUrl = pages[page];
      if (pageUrl) window.location.href = pageUrl;
      else showToast('Page coming soon!');
    }

    // Survey Data
    const allSurveys = [
      { id: "s1", title: "☕ Coffee Habits", reward: 0.80, time: "3 min", q: 3, cat: "consumer", tags: ["Coffee"], popular: true, company: "Starbucks", icon: "fa-mug-hot", color: "#f59e0b", rate: 87 },
      { id: "s2", title: "🎮 Mobile Gaming", reward: 0.90, time: "4 min", q: 4, cat: "tech", tags: ["Gaming"], popular: true, company: "GameDev", icon: "fa-gamepad", color: "#8b5cf6", rate: 92 },
      { id: "s3", title: "📺 Streaming", reward: 1.00, time: "5 min", q: 5, cat: "tech", tags: ["Streaming"], popular: true, company: "Media", icon: "fa-tv", color: "#ec489a", rate: 78 },
      { id: "s4", title: "💻 WFH Tools", reward: 0.75, time: "3 min", q: 3, cat: "business", tags: ["Work"], company: "TechCorp", icon: "fa-laptop-code", color: "#06b6d4", rate: 85 },
      { id: "s5", title: "🍪 Snack Brands", reward: 0.65, time: "2 min", q: 2, cat: "consumer", tags: ["Food"], new: true, company: "SnackCo", icon: "fa-cookie-bite", color: "#f59e0b", rate: 95 },
      { id: "s6", title: "🏃 Fitness", reward: 0.95, time: "4 min", q: 4, cat: "health", tags: ["Fitness"], trending: true, company: "Wellness", icon: "fa-heartbeat", color: "#10b981", rate: 88 },
      { id: "s7", title: "🛍️ Online Shopping", reward: 0.85, time: "4 min", q: 4, cat: "consumer", tags: ["Shopping"], popular: true, company: "Retail", icon: "fa-shopping-cart", color: "#ef4444", rate: 82 },
      { id: "s8", title: "📱 Social Media", reward: 0.70, time: "3 min", q: 3, cat: "tech", tags: ["Social"], company: "SocialInsights", icon: "fa-hashtag", color: "#3b82f6", rate: 90 },
      { id: "s9", title: "🚗 Electric Vehicles", reward: 1.20, time: "6 min", q: 6, cat: "business", tags: ["EV"], new: true, company: "Auto", icon: "fa-car", color: "#06b6d4", rate: 75 },
      { id: "s10", title: "💳 Digital Banking", reward: 1.10, time: "5 min", q: 5, cat: "business", tags: ["Banking"], popular: true, company: "FinTech", icon: "fa-credit-card", color: "#8b5cf6", rate: 79 }
    ];

    let surveys = [], currentUser = null, completed = [], currentFilter = 'all', currentCat = 'all', earned = 0, streak = 0;

    function checkAuth() {
      if (localStorage.getItem('taskpay_logged_in') !== 'true') { 
        window.location.href = 'login.html'; 
        return false; 
      }
      currentUser = localStorage.getItem('taskpay_user_email') || 'user@taskpay.com';
      loadData();
      return true;
    }

    function loadData() {
      const key = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      completed = JSON.parse(localStorage.getItem(`taskpay_completed_surveys_${key}`) || '[]');
      earned = 0;
      surveys = allSurveys.map(s => { 
        const c = completed.includes(s.id); 
        if (c) earned += s.reward; 
        return { ...s, completed: c }; 
      });
      streak = Math.floor(Math.random() * 14) + 1;
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userName').textContent = userName;
      document.getElementById('userEmail').textContent = currentUser;
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
      
      updateStats();
      renderCats();
      render();
    }

    function updateStats() {
      document.getElementById('completedCount').textContent = surveys.filter(s => s.completed).length;
      document.getElementById('availableCount').textContent = surveys.filter(s => !s.completed).length;
      document.getElementById('surveysEarned').textContent = `$${earned.toFixed(2)}`;
      document.getElementById('surveyStreak').textContent = streak;
    }

    function renderCats() {
      const cats = [
        { id: 'all', name: 'All', icon: 'fa-th-large' },
        { id: 'consumer', name: '🛍️ Consumer', icon: 'fa-users' },
        { id: 'tech', name: '💻 Tech', icon: 'fa-gamepad' },
        { id: 'business', name: '📊 Business', icon: 'fa-chart-line' },
        { id: 'health', name: '🏃 Health', icon: 'fa-heartbeat' }
      ];
      document.getElementById('categoryFilters').innerHTML = cats.map(c => `
        <button class="category-btn ${currentCat === c.id ? 'active' : ''}" data-cat="${c.id}">
          <i class="fas ${c.icon}"></i> ${c.name}
        </button>
      `).join('');
      document.querySelectorAll('.category-btn').forEach(b => b.addEventListener('click', () => { 
        currentCat = b.dataset.cat; 
        renderCats(); 
        render(); 
      }));
    }

    function render() {
      let filtered = surveys.filter(s => currentCat === 'all' || s.cat === currentCat);
      if (currentFilter === 'available') filtered = filtered.filter(s => !s.completed);
      else if (currentFilter === 'completed') filtered = filtered.filter(s => s.completed);
      else if (currentFilter === 'highest') filtered.sort((a, b) => b.reward - a.reward);
      else if (currentFilter === 'short') filtered.sort((a, b) => a.q - b.q);
      
      const container = document.getElementById('surveysContainer');
      if (!filtered.length) { 
        container.innerHTML = `<div class="empty-state"><i class="fas fa-poll"></i><h3>No surveys found</h3><p>Check back later!</p></div>`; 
        return; 
      }
      
      container.innerHTML = filtered.map(s => `
        <div class="survey-card" onclick="startSurvey('${s.id}')">
          <div class="survey-header" style="background:linear-gradient(135deg, ${s.color}, ${s.color}dd);">
            ${s.popular ? '<div class="popular-badge"><i class="fas fa-fire"></i> Popular</div>' : ''}
            ${s.new ? '<div class="new-badge"><i class="fas fa-star"></i> New</div>' : ''}
            <div class="survey-category"><i class="fas ${s.icon}"></i> ${s.cat.toUpperCase()}</div>
            <h3 class="survey-title">${s.title}</h3>
            <p class="survey-description">${s.description || 'Share your opinion'}</p>
            <div class="survey-stats">
              <span><i class="far fa-clock"></i> ${s.time}</span>
              <span><i class="far fa-question-circle"></i> ${s.q} questions</span>
            </div>
          </div>
          <div class="survey-content">
            <div class="reward-section">
              <div class="survey-reward">$${s.reward.toFixed(2)} <small>USD</small></div>
              <div class="survey-time"><i class="fas fa-hourglass-half"></i> ${s.time}</div>
            </div>
            <div class="survey-details">
              <div class="detail-item"><i class="fas fa-building"></i> ${s.company}</div>
              <div class="detail-item"><i class="fas fa-chart-line"></i> ${s.rate}% rating</div>
            </div>
            <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="completion-progress"><div class="progress-fill" style="width:${s.rate}%"></div></div>
            <div class="survey-footer">
              ${s.completed ? `<div class="completed-badge"><i class="fas fa-check-circle"></i> Completed</div>` : 
                `<button class="start-btn" onclick="event.stopPropagation(); startSurvey('${s.id}')"><i class="fas fa-play"></i> Take Survey</button>`}
            </div>
          </div>
        </div>
      `).join('');
    }

    function startSurvey(id) {
      const survey = surveys.find(s => s.id === id);
      if (survey.completed) return showToast('Already completed!');
      if (confirm(`Take "${survey.title}" survey to earn $${survey.reward.toFixed(2)}?`)) {
        completeSurvey(id);
      }
    }

    function completeSurvey(id) {
      const survey = surveys.find(s => s.id === id);
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      
      completed.push(id);
      localStorage.setItem(`taskpay_completed_surveys_${userKey}`, JSON.stringify(completed));
      
      let balance = parseFloat(localStorage.getItem(`taskpay_balance_${userKey}`) || '0');
      let totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      let surveysDone = parseInt(localStorage.getItem(`taskpay_surveys_done_${userKey}`) || '0');
      
      balance += survey.reward;
      totalEarned += survey.reward;
      surveysDone += 1;
      
      localStorage.setItem(`taskpay_balance_${userKey}`, balance.toFixed(2));
      localStorage.setItem(`taskpay_total_earned_${userKey}`, totalEarned.toFixed(2));
      localStorage.setItem(`taskpay_surveys_done_${userKey}`, surveysDone);
      
      earned += survey.reward;
      survey.completed = true;
      
      updateStats();
      render();
      showToast(`🎉 +$${survey.reward.toFixed(2)} earned!`);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('taskpay_logged_in');
        localStorage.removeItem('taskpay_user_email');
        window.location.href = 'login.html';
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });
    
    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
    
    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', (e) => {
      if (window.innerWidth < 768 && sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
          sidebar.classList.remove('open');
        }
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', logout);
    window.navigateTo = navigateTo;
    window.startSurvey = startSurvey;
    
    if (checkAuth()) {}
  </script>
</body>
</html>
