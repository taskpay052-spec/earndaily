<script type="module">
  import { supabase } from './supabase-config.js';
  
  let currentUser = null;
  let userId = null;
  let earningsChart, completionChart;
  let currentEarningsPeriod = '7';
  let currentCompletionPeriod = '7';

  const earningsData = {
    '7': [4.2, 5.8, 7.5, 6.3, 8.9, 12.4, 10.2],
    '30': [4.2, 5.8, 7.5, 6.3, 8.9, 12.4, 10.2, 11.5, 9.8, 10.2, 12.1, 13.5, 14.2, 15.1, 14.8, 16.2, 17.5, 16.9, 18.3, 19.1, 20.5, 21.2, 22.8, 23.5, 24.1, 25.3, 26.0, 27.2, 28.5, 29.0],
    'all': [2.1, 3.2, 4.5, 5.8, 6.2, 7.1, 8.3, 9.5, 10.8, 12.1, 13.4, 14.7, 16.0, 17.3, 18.6, 19.9, 21.2, 22.5, 23.8, 25.1, 26.4, 27.7, 29.0, 30.3, 31.6, 32.9, 34.2, 35.5, 36.8, 38.1]
  };

  const completionData = {
    '7': [45, 52, 58, 63, 71, 78, 85],
    '30': [45, 48, 52, 55, 58, 62, 65, 68, 71, 74, 77, 80, 82, 84, 86, 88, 89, 90, 91, 92, 93, 94, 94, 95, 95, 96, 96, 97, 97, 98]
  };

  const quickTasks = [
    { id: 1, title: "Rate Mobile App Icon", reward: 0.35, time: "30 sec", icon: "fa-star" },
    { id: 2, title: "Watch Product Preview", reward: 0.50, time: "1 min", icon: "fa-play" },
    { id: 3, title: "Share a Fun Fact", reward: 0.45, time: "2 min", icon: "fa-pen" },
    { id: 4, title: "Weather Screenshot", reward: 0.60, time: "1 min", icon: "fa-cloud-sun" }
  ];

  const featuredSurveys = [
    { id: 1, title: "Coffee Shop Habits", reward: 0.80, questions: 3, icon: "fa-mug-hot" },
    { id: 2, title: "Mobile Gaming Survey", reward: 0.90, questions: 4, icon: "fa-gamepad" },
    { id: 3, title: "Streaming Services", reward: 1.00, questions: 5, icon: "fa-tv" }
  ];

  // YOUR ORIGINAL navigateTo - EXACTLY as you had it
  function navigateTo(page) {
    const pages = {
      'dashboard': 'dashboard.html',
      'tasks': 'tasks.html',
      'surveys': 'surveys.html',
      'activate': 'activate.html',
      'withdrawals': 'withdrawal.html',
      'profile': 'profile.html',
      'referrals': 'referral.html',
      'history': 'history.html',
      'support': 'support.html'
    };
    const pageUrl = pages[page];
    if (pageUrl) window.location.href = pageUrl;
    else showToast('Page coming soon!');
  }

  // Modified checkAuth to work with Supabase but keep localStorage fallback
  async function checkAuth() {
    // First check localStorage for existing session (your original method)
    const isLoggedIn = localStorage.getItem('taskpay_logged_in');
    const userEmail = localStorage.getItem('taskpay_user_email');
    
    if (isLoggedIn === 'true' && userEmail) {
      currentUser = userEmail;
      return true;
    }
    
    // Then try Supabase
    try {
      const { data: { user }, error } = await supabase.auth.getUser();
      if (!error && user) {
        currentUser = user.email;
        userId = user.id;
        localStorage.setItem('taskpay_logged_in', 'true');
        localStorage.setItem('taskpay_user_email', currentUser);
        return true;
      }
    } catch(e) {
      console.log('Supabase not connected');
    }
    
    window.location.href = 'login.html';
    return false;
  }

  // YOUR ORIGINAL loadUserData - just added Supabase as extra data source
  async function loadUserData() {
    const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
    let totalEarned = localStorage.getItem(`taskpay_total_earned_${userKey}`);
    let tasksDone = localStorage.getItem(`taskpay_tasks_done_${userKey}`);
    let surveysDone = localStorage.getItem(`taskpay_surveys_done_${userKey}`);
    let isActivated = localStorage.getItem(`taskpay_activated_${userKey}`);
    
    // Try to get fresh data from Supabase if available
    if (userId) {
      try {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if (profile) {
          totalEarned = profile.total_earned?.toString() || '0';
          tasksDone = profile.tasks_completed?.toString() || '0';
          surveysDone = profile.surveys_completed?.toString() || '0';
          isActivated = profile.is_activated ? 'true' : 'false';
        }
      } catch(e) {}
    }
    
    if (!totalEarned) totalEarned = '0';
    if (!tasksDone) tasksDone = '0';
    if (!surveysDone) surveysDone = '0';
    
    const stats = [
      { value: `$${parseFloat(totalEarned).toFixed(2)}`, label: 'Total Earnings', icon: 'earnings', trend: '+0%', trendUp: true },
      { value: parseInt(tasksDone), label: 'Tasks Completed', icon: 'tasks', trend: '+0 this week', trendUp: true },
      { value: parseInt(surveysDone), label: 'Surveys Completed', icon: 'surveys', trend: '+0 this week', trendUp: true },
      { value: 1, label: 'Day Streak', icon: 'streak', trend: 'Start earning!', trendUp: true }
    ];
    
    renderStats(stats);
    
    const userName = currentUser.split('@')[0];
    document.getElementById('userName').textContent = userName;
    document.getElementById('userEmail').textContent = currentUser;
    document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    
    const activateNavItem = document.getElementById('activateNavItem');
    const activateText = document.getElementById('activateText');
    
    if (activateNavItem && activateText) {
      if (isActivated === 'true') {
        activateText.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 8px;"></i> Activated';
        activateNavItem.style.cursor = 'pointer';
        activateNavItem.onclick = () => showToast('Your account is already activated!');
      } else {
        activateText.innerHTML = 'Activate Account';
        activateNavItem.onclick = () => navigateTo('activate');
      }
    }
  }

  // YOUR ORIGINAL renderStats - EXACTLY as you had it
  function renderStats(stats) {
    const container = document.getElementById('statsGrid');
    if (!container) return;
    container.innerHTML = stats.map(stat => `
      <div class="stat-card" onclick="navigateTo('${stat.label === 'Tasks Completed' ? 'tasks' : stat.label === 'Surveys Completed' ? 'surveys' : 'dashboard'}')">
        <div class="stat-header">
          <div class="stat-icon ${stat.icon}">
            <i class="fas ${stat.icon === 'earnings' ? 'fa-dollar-sign' : stat.icon === 'tasks' ? 'fa-check-circle' : stat.icon === 'surveys' ? 'fa-poll' : 'fa-fire'} fa-2x"></i>
          </div>
        </div>
        <div class="stat-value">${stat.value}</div>
        <div class="stat-label">${stat.label}</div>
        <div class="stat-trend">
          <i class="fas fa-arrow-${stat.trendUp ? 'up' : 'down'} trend-${stat.trendUp ? 'up' : 'down'}"></i>
          <span>${stat.trend}</span>
        </div>
      </div>
    `).join('');
  }

  // YOUR ORIGINAL initCharts - EXACTLY as you had it
  function initCharts() {
    const ctx1 = document.getElementById('earningsChart')?.getContext('2d');
    const ctx2 = document.getElementById('completionChart')?.getContext('2d');
    if (!ctx1 || !ctx2) return;
    
    earningsChart = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: generateLabels(currentEarningsPeriod),
        datasets: [{ label: 'Earnings ($)', data: earningsData[currentEarningsPeriod], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#10b981', pointBorderColor: 'white', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: true, animation: { duration: 1000, easing: 'easeInOutQuart' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f172a', callbacks: { label: function(context) { return `$${context.parsed.y.toFixed(2)}`; } } } }, scales: { y: { grid: { color: 'var(--border-color)' }, ticks: { callback: v => '$' + v } } } }
    });
    
    completionChart = new Chart(ctx2, {
      type: 'line',
      data: {
        labels: generateLabels(currentCompletionPeriod),
        datasets: [{ label: 'Completion Rate (%)', data: completionData[currentCompletionPeriod], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#3b82f6', pointBorderColor: 'white', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: true, animation: { duration: 1000, easing: 'easeInOutQuart' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f172a', callbacks: { label: function(context) { return `${context.parsed.y}%`; } } } }, scales: { y: { grid: { color: 'var(--border-color)' }, ticks: { callback: v => v + '%' }, min: 0, max: 100 } } }
    });
  }

  // YOUR ORIGINAL generateLabels - EXACTLY as you had it
  function generateLabels(period) {
    if (period === '7') return ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    if (period === '30') return Array.from({length: 30}, (_, i) => `Day ${i+1}`);
    return Array.from({length: 30}, (_, i) => `Week ${i+1}`);
  }

  // YOUR ORIGINAL updateChart - EXACTLY as you had it
  function updateChart(chart, period, type) {
    if (!chart) return;
    if (type === 'earnings') {
      chart.data.datasets[0].data = earningsData[period];
      chart.data.labels = generateLabels(period);
    } else {
      chart.data.datasets[0].data = completionData[period];
      chart.data.labels = generateLabels(period);
    }
    chart.update();
  }

  // YOUR ORIGINAL initSidebarToggle - EXACTLY as you had it
  function initSidebarToggle() {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const overlay = document.getElementById('sidebarOverlay');
    const isMobile = () => window.innerWidth <= 768;
    const closeMobileSidebar = () => { if (isMobile()) { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); } };
    const openMobileSidebar = () => { if (isMobile()) { sidebar.classList.add('mobile-open'); overlay.classList.add('active'); } };
    const toggleDesktopSidebar = () => { if (!isMobile()) { sidebar.classList.toggle('sidebar-hidden'); localStorage.setItem('sidebar_hidden', sidebar.classList.contains('sidebar-hidden')); } };
    if (menuToggle) menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (isMobile()) { if (sidebar.classList.contains('mobile-open')) closeMobileSidebar(); else openMobileSidebar(); } else { toggleDesktopSidebar(); } });
    if (overlay) overlay.addEventListener('click', closeMobileSidebar);
    let resizeTimer; window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { if (!isMobile()) { closeMobileSidebar(); const savedHiddenState = localStorage.getItem('sidebar_hidden'); if (savedHiddenState === 'true') sidebar.classList.add('sidebar-hidden'); else sidebar.classList.remove('sidebar-hidden'); } else { sidebar.classList.remove('sidebar-hidden'); closeMobileSidebar(); } }, 100); });
    if (!isMobile()) { const savedHiddenState = localStorage.getItem('sidebar_hidden'); if (savedHiddenState === 'true') sidebar.classList.add('sidebar-hidden'); }
    if (isMobile()) { sidebar.classList.remove('sidebar-hidden'); closeMobileSidebar(); }
  }

  // YOUR ORIGINAL initTheme - EXACTLY as you had it
  function initTheme() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeIcon = document.querySelector('#themeToggle i');
    if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) themeToggle.addEventListener('click', () => { const currentTheme = document.documentElement.getAttribute('data-theme'); const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', newTheme); localStorage.setItem('theme', newTheme); const icon = document.querySelector('#themeToggle i'); if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'; showToast(`${newTheme === 'dark' ? 'Dark' : 'Light'} mode activated`); });
  }

  // YOUR ORIGINAL initDropdowns - EXACTLY as you had it (only changed logout to also clear Supabase)
  function initDropdowns() {
    const notificationTrigger = document.getElementById('notificationTrigger');
    const notificationMenu = document.getElementById('notificationMenu');
    if (notificationTrigger && notificationMenu) {
      notificationTrigger.addEventListener('click', (e) => { e.stopPropagation(); notificationMenu.classList.toggle('show'); });
    }
    const profileTrigger = document.getElementById('profileTrigger');
    const profileMenu = document.getElementById('profileMenu');
    if (profileTrigger && profileMenu) {
      profileTrigger.addEventListener('click', (e) => { e.stopPropagation(); profileMenu.classList.toggle('show'); });
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.notification-dropdown')) notificationMenu?.classList.remove('show');
      if (!e.target.closest('.profile-dropdown')) profileMenu?.classList.remove('show');
    });
    document.querySelectorAll('.profile-menu-item').forEach(item => {
      item.addEventListener('click', async (e) => {
        const action = item.dataset.action;
        if (action === 'logout') {
          if (confirm('Are you sure you want to logout?')) {
            try { await supabase.auth.signOut(); } catch(e) {}
            localStorage.removeItem('taskpay_logged_in');
            localStorage.removeItem('taskpay_user_email');
            showToast('Logged out successfully');
            setTimeout(() => window.location.href = 'login.html', 1000);
          }
        } else if (action === 'profile') {
          navigateTo('profile');
        } else {
          showToast(`${action} page coming soon!`);
        }
        profileMenu?.classList.remove('show');
      });
    });
  }

  // YOUR ORIGINAL initChartFilters - EXACTLY as you had it
  function initChartFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { const chart = btn.dataset.chart; const period = btn.dataset.period; document.querySelectorAll(`.filter-btn[data-chart="${chart}"]`).forEach(b => b.classList.remove('active')); btn.classList.add('active'); if (chart === 'earnings') { currentEarningsPeriod = period; updateChart(earningsChart, period, 'earnings'); } else { currentCompletionPeriod = period; updateChart(completionChart, period, 'completion'); } }); });
  }

  // YOUR ORIGINAL renderTasks - EXACTLY as you had it
  function renderTasks() {
    const tasksContainer = document.getElementById('quickTasks');
    if (tasksContainer) tasksContainer.innerHTML = quickTasks.map(task => `<div class="task-item" onclick="navigateTo('tasks')"><div class="task-info"><div class="task-icon"><i class="fas ${task.icon}" style="color: #10b981;"></i></div><div class="task-details"><h4>${task.title}</h4><p>${task.time} · Quick task</p></div></div><div class="task-reward" style="color: #10b981; font-weight: 700;">+$${task.reward}</div></div>`).join('');
    const surveysContainer = document.getElementById('featuredSurveys');
    if (surveysContainer) surveysContainer.innerHTML = featuredSurveys.map(survey => `<div class="task-item" onclick="navigateTo('surveys')"><div class="task-info"><div class="task-icon"><i class="fas ${survey.icon}" style="color: #8b5cf6;"></i></div><div class="task-details"><h4>${survey.title}</h4><p>${survey.questions} questions · ${survey.reward === 1.00 ? 'Hot 🔥' : 'Popular'}</p></div></div><div class="task-reward" style="color: #10b981; font-weight: 700;">+$${survey.reward}</div></div>`).join('');
  }

  // YOUR ORIGINAL initSidebarNavigation - EXACTLY as you had it
  function initSidebarNavigation() {
    document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', () => { const page = item.getAttribute('data-page'); if (page) { const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('sidebarOverlay'); if (window.innerWidth <= 768) { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); } navigateTo(page); } }); });
  }

  // YOUR ORIGINAL showToast - EXACTLY as you had it
  function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-check-circle" style="color: #10b981;"></i> ${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

  window.showToast = showToast; window.navigateTo = navigateTo;
  
  // YOUR ORIGINAL initialization - just changed checkAuth to async
  if (await checkAuth()) { 
    await loadUserData(); 
    initSidebarToggle(); 
    initTheme(); 
    initCharts(); 
    initChartFilters(); 
    initDropdowns(); 
    initSidebarNavigation(); 
    renderTasks(); 
    document.getElementById('viewAllTasksBtn')?.addEventListener('click', () => navigateTo('tasks')); 
    document.getElementById('viewAllSurveysBtn')?.addEventListener('click', () => navigateTo('surveys')); 
  }
</script>
