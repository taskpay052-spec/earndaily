  <script type="module">
    import { supabase } from './supabase-config.js';
    
    let userId = null;
    let userEmail = null;
    let earningsChart, completionChart;
    let currentEarningsPeriod = '7';
    let currentCompletionPeriod = '7';

    const earningsData = {
      '7': [4.2, 5.8, 7.5, 6.3, 8.9, 12.4, 10.2],
      '30': [4.2, 5.8, 7.5, 6.3, 8.9, 12.4, 10.2, 11.5, 9.8, 10.2, 12.1, 13.5, 14.2, 15.1, 14.8, 16.2, 17.5, 16.9, 18.3, 19.1, 20.5, 21.2, 22.8, 23.5, 24.1, 25.3, 26.0, 27.2, 28.5, 29.0]
    };

    const completionData = {
      '7': [45, 52, 58, 63, 71, 78, 85],
      '30': [45, 48, 52, 55, 58, 62, 65, 68, 71, 74, 77, 80, 82, 84, 86, 88, 89, 90, 91, 92, 93, 94, 94, 95, 95, 96, 96, 97, 97, 98]
    };

    const quickTasks = [
      { id: 1, title: "Rate Mobile App Icon", reward: 0.35, time: "30 sec", icon: "fa-star" },
      { id: 2, title: "Watch Product Preview", reward: 0.50, time: "1 min", icon: "fa-play" },
      { id: 3, title: "Share a Fun Fact", reward: 0.45, time: "2 min", icon: "fa-pen" },
      { id: 4, title: "Weather Screenshot", reward: 0.60, time: "1 min", icon: "fa-cloud-sun" }
    ];

    const featuredSurveys = [
      { id: 1, title: "Coffee Shop Habits", reward: 0.80, questions: 3, icon: "fa-mug-hot" },
      { id: 2, title: "Mobile Gaming Survey", reward: 0.90, questions: 4, icon: "fa-gamepad" },
      { id: 3, title: "Streaming Services", reward: 1.00, questions: 5, icon: "fa-tv" }
    ];

    function navigateTo(page) {
      const pages = { 'dashboard': 'dashboard.html', 'tasks': 'tasks.html', 'surveys': 'surveys.html', 'activate': 'activate.html', 'withdrawals': 'withdrawal.html', 'profile': 'profile.html', 'referrals': 'referral.html', 'history': 'history.html', 'support': 'support.html' };
      window.location.href = pages[page] || '#';
    }

    // Try to get user from localStorage first (fallback), then Supabase
    async function getCurrentUser() {
      // First check localStorage for existing session
      const localEmail = localStorage.getItem('taskpay_user_email');
      if (localEmail) {
        userEmail = localEmail;
        // Try to get user from Supabase
        try {
          const { data: { user } } = await supabase.auth.getUser();
          if (user) {
            userId = user.id;
            userEmail = user.email;
            return true;
          }
        } catch(e) { console.log('Supabase not connected, using localStorage mode'); }
        // Fallback: generate a fake userId from email
        userId = 'local_' + userEmail.replace(/[^a-zA-Z0-9]/g, '_');
        return true;
      }
      return false;
    }

    async function loadUserData() {
      // Try to get profile from Supabase if available
      let totalEarned = 0, tasksDone = 0, surveysDone = 0, isActivated = false;
      
      if (userId && !userId.startsWith('local_')) {
        try {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', userId).single();
          if (profile) {
            totalEarned = profile.total_earned || 0;
            tasksDone = profile.tasks_completed || 0;
            surveysDone = profile.surveys_completed || 0;
            isActivated = profile.is_activated || false;
          }
        } catch(e) { console.log('Using localStorage for profile data'); }
      }
      
      // Fallback to localStorage
      const userKey = userId || (userEmail ? userEmail.replace(/[^a-zA-Z0-9]/g, '_') : 'default');
      if (totalEarned === 0) totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      if (tasksDone === 0) tasksDone = parseInt(localStorage.getItem(`taskpay_tasks_done_${userKey}`) || '0');
      if (surveysDone === 0) surveysDone = parseInt(localStorage.getItem(`taskpay_surveys_done_${userKey}`) || '0');
      if (!isActivated) isActivated = localStorage.getItem(`taskpay_activated_${userKey}`) === 'true';
      
      const stats = [
        { value: `$${totalEarned.toFixed(2)}`, label: 'Total Earnings', icon: 'earnings', trend: '+0%', trendUp: true },
        { value: tasksDone, label: 'Tasks Completed', icon: 'tasks', trend: '+0 this week', trendUp: true },
        { value: surveysDone, label: 'Surveys Completed', icon: 'surveys', trend: '+0 this week', trendUp: true },
        { value: 1, label: 'Day Streak', icon: 'streak', trend: 'Start earning!', trendUp: true }
      ];
      
      renderStats(stats);
      
      const userName = userEmail ? userEmail.split('@')[0] : 'User';
      document.getElementById('userName').textContent = userName;
      document.getElementById('userEmail').textContent = userEmail || 'user@taskpay.com';
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
      
      const activateText = document.getElementById('activateText');
      if (activateText) {
        if (isActivated) {
          activateText.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 8px;"></i> Activated';
          document.getElementById('activateNavItem').onclick = () => showToast('Your account is already activated!');
        } else {
          activateText.innerHTML = 'Activate Account';
          document.getElementById('activateNavItem').onclick = () => navigateTo('activate');
        }
      }
    }

    function renderStats(stats) {
      const container = document.getElementById('statsGrid');
      if (!container) return;
      container.innerHTML = stats.map(stat => `
        <div class="stat-card" onclick="navigateTo('${stat.label === 'Tasks Completed' ? 'tasks' : stat.label === 'Surveys Completed' ? 'surveys' : 'dashboard'}')">
          <div class="stat-header"><div class="stat-icon ${stat.icon}"><i class="fas ${stat.icon === 'earnings' ? 'fa-dollar-sign' : stat.icon === 'tasks' ? 'fa-check-circle' : stat.icon === 'surveys' ? 'fa-poll' : 'fa-fire'} fa-2x"></i></div></div>
          <div class="stat-value">${stat.value}</div>
          <div class="stat-label">${stat.label}</div>
          <div class="stat-trend"><i class="fas fa-arrow-${stat.trendUp ? 'up' : 'down'} trend-${stat.trendUp ? 'up' : 'down'}"></i><span>${stat.trend}</span></div>
        </div>
      `).join('');
    }

    function initCharts() {
      const ctx1 = document.getElementById('earningsChart')?.getContext('2d');
      const ctx2 = document.getElementById('completionChart')?.getContext('2d');
      if (!ctx1 || !ctx2) return;
      
      earningsChart = new Chart(ctx1, {
        type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Earnings ($)', data: earningsData['7'], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#10b981', pointBorderColor: 'white', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f172a', callbacks: { label: function(context) { return `$${context.parsed.y.toFixed(2)}`; } } } }, scales: { y: { grid: { color: 'var(--border-color)' }, ticks: { callback: v => '$' + v } } } }
      });
      
      completionChart = new Chart(ctx2, {
        type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Completion Rate (%)', data: completionData['7'], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#3b82f6', pointBorderColor: 'white', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f172a', callbacks: { label: function(context) { return `${context.parsed.y}%`; } } } }, scales: { y: { grid: { color: 'var(--border-color)' }, ticks: { callback: v => v + '%' }, min: 0, max: 100 } } }
      });
    }

    function initSidebarToggle() {
      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.getElementById('menuToggle');
      const overlay = document.getElementById('sidebarOverlay');
      const isMobile = () => window.innerWidth <= 768;
      const closeMobileSidebar = () => { if (isMobile()) { sidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); } };
      const openMobileSidebar = () => { if (isMobile()) { sidebar.classList.add('mobile-open'); overlay.classList.add('active'); } };
      const toggleDesktopSidebar = () => { if (!isMobile()) { sidebar.classList.toggle('sidebar-hidden'); localStorage.setItem('sidebar_hidden', sidebar.classList.contains('sidebar-hidden')); } };
      if (menuToggle) menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (isMobile()) { if (sidebar.classList.contains('mobile-open')) closeMobileSidebar(); else openMobileSidebar(); } else { toggleDesktopSidebar(); } });
      if (overlay) overlay.addEventListener('click', closeMobileSidebar);
      let resizeTimer; window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { if (!isMobile()) { closeMobileSidebar(); const savedHiddenState = localStorage.getItem('sidebar_hidden'); if (savedHiddenState === 'true') sidebar.classList.add('sidebar-hidden'); else sidebar.classList.remove('sidebar-hidden'); } else { sidebar.classList.remove('sidebar-hidden'); closeMobileSidebar(); } }, 100); });
      if (!isMobile()) { const savedHiddenState = localStorage.getItem('sidebar_hidden'); if (savedHiddenState === 'true') sidebar.classList.add('sidebar-hidden'); }
      if (isMobile()) { sidebar.classList.remove('sidebar-hidden'); closeMobileSidebar(); }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const themeIcon = document.querySelector('#themeToggle i');
      if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      const themeToggle = document.getElementById('themeToggle');
      if (themeToggle) themeToggle.addEventListener('click', () => { const currentTheme = document.documentElement.getAttribute('data-theme'); const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', newTheme); localStorage.setItem('theme', newTheme); const icon = document.querySelector('#themeToggle i'); if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'; showToast(`${newTheme === 'dark' ? 'Dark' : 'Light'} mode activated`); });
    }

    function initDropdowns() {
      const notificationTrigger = document.getElementById('notificationTrigger');
      const notificationMenu = document.getElementById('notificationMenu');
      if (notificationTrigger && notificationMenu) { notificationTrigger.addEventListener('click', (e) => { e.stopPropagation(); notificationMenu.classList.toggle('show'); }); }
      const profileTrigger = document.getElementById('profileTrigger');
      const profileMenu = document.getElementById('profileMenu');
      if (profileTrigger && profileMenu) { profileTrigger.addEventListener('click', (e) => { e.stopPropagation(); profileMenu.classList.toggle('show'); }); }
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.notification-dropdown')) notificationMenu?.classList.remove('show');
        if (!e.target.closest('.profile-dropdown')) profileMenu?.classList.remove('show');
      });
      document.querySelectorAll('.profile-menu-item').forEach(item => {
        item.addEventListener('click', async (e) => {
          const action = item.dataset.action;
          if (action === 'logout') {
            if (confirm('Logout?')) { 
              localStorage.removeItem('taskpay_logged_in'); 
              localStorage.removeItem('taskpay_user_email'); 
              showToast('Logged out successfully'); 
              setTimeout(() => window.location.href = 'login.html', 1000); 
            }
          } else if (action === 'profile') { navigateTo('profile'); }
          profileMenu?.classList.remove('show');
        });
      });
    }

    function initChartFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { const chart = btn.dataset.chart; const period = btn.dataset.period; document.querySelectorAll(`.filter-btn[data-chart="${chart}"]`).forEach(b => b.classList.remove('active')); btn.classList.add('active'); if (chart === 'earnings') { currentEarningsPeriod = period; updateChart(earningsChart, period, 'earnings'); } else { currentCompletionPeriod = period; updateChart(completionChart, period, 'completion'); } }); });
    }

    function updateChart(chart, period, type) {
      if (!chart) return;
      if (type === 'earnings') { chart.data.datasets[0].data = earningsData[period]; chart.data.labels = period === '7' ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] : Array.from({length: 30}, (_, i) => `Day ${i+1}`); }
      else { chart.data.datasets[0].data = completionData[period]; chart.data.labels = period === '7' ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] : Array.from({length: 30}, (_, i) => `Day ${i+1}`); }
      chart.update();
    }

    function renderTasks() {
      const tasksContainer = document.getElementById('quickTasks');
      if (tasksContainer) tasksContainer.innerHTML = quickTasks.map(task => `<div class="task-item" onclick="navigateTo('tasks')"><div class="task-info"><div class="task-icon"><i class="fas ${task.icon}" style="color: #10b981;"></i></div><div class="task-details"><h4>${task.title}</h4><p>${task.time} · Quick task</p></div></div><div class="task-reward" style="color: #10b981; font-weight: 700;">+$${task.reward}</div></div>`).join('');
      const surveysContainer = document.getElementById('featuredSurveys');
      if (surveysContainer) surveysContainer.innerHTML = featuredSurveys.map(survey => `<div class="task-item" onclick="navigateTo('surveys')"><div class="task-info"><div class="task-icon"><i class="fas ${survey.icon}" style="color: #8b5cf6;"></i></div><div class="task-details"><h4>${survey.title}</h4><p>${survey.questions} questions · ${survey.reward === 1.00 ? 'Hot 🔥' : 'Popular'}</p></div></div><div class="task-reward" style="color: #10b981; font-weight: 700;">+$${survey.reward}</div></div>`).join('');
    }

    function initSidebarNavigation() {
      document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', () => { const page = item.getAttribute('data-page'); if (page) { if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebarOverlay').classList.remove('active'); } navigateTo(page); } }); });
    }

    function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-check-circle" style="color: #10b981;"></i> ${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

    window.showToast = showToast; window.navigateTo = navigateTo;
    
    async function init() {
      const isAuth = await getCurrentUser();
      if (!isAuth) { window.location.href = 'login.html'; return; }
      await loadUserData();
      initSidebarToggle();
      initTheme();
      initCharts();
      initChartFilters();
      initDropdowns();
      initSidebarNavigation();
      renderTasks();
      document.getElementById('viewAllTasksBtn')?.addEventListener('click', () => navigateTo('tasks'));
      document.getElementById('viewAllSurveysBtn')?.addEventListener('click', () => navigateTo('surveys'));
    }
    
    init();
  </script>
</body>
</html>
