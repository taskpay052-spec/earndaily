<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      max-width: 450px;
      width: 100%;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .logo-icon i {
      font-size: 28px;
      color: white;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .demo-credentials {
      background: #f8fafc;
      border-radius: 16px;
      padding: 1rem;
      margin-top: 1.5rem;
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .demo-credentials p {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .demo-credentials code {
      background: #e2e8f0;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #059669;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }

    .signup-link a {
      color: #059669;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .login-card {
        padding: 1.5rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to continue earning</p>
      
      <div id="errorMessage" class="error-message"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      
      <div class="demo-credentials">
        <p>✨ Demo Credentials (for testing)</p>
        <p><code>user@taskpay.com</code> / <code>any password</code></p>
        <p style="font-size: 0.7rem; margin-top: 0.5rem;">Enter any email and password to login</p>
      </div>
      
      <div class="signup-link">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-config.js';
    
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    function showError(message) {
      errorMessage.style.display = 'block';
      errorMessage.style.background = '#fee2e2';
      errorMessage.style.color = '#dc2626';
      errorMessage.textContent = message;
      
      setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 3000);
    }

    function showSuccess(message) {
      errorMessage.style.display = 'block';
      errorMessage.style.background = '#d1fae5';
      errorMessage.style.color = '#065f46';
      errorMessage.textContent = message;
    }

    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }
      
      // Show loading state
      const loginBtn = document.querySelector('.btn-login');
      const originalText = loginBtn.innerHTML;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing in...';
      loginBtn.disabled = true;
      
      try {
        // Sign in with Supabase
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) throw error;
        
        if (data.user) {
          // Store user info in localStorage for quick access
          localStorage.setItem('taskpay_logged_in', 'true');
          localStorage.setItem('taskpay_user_email', email);
          localStorage.setItem('taskpay_user_id', data.user.id);
          
          showSuccess('Login successful! Redirecting to dashboard...');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        }
      } catch (err) {
        // If Supabase login fails, fallback to demo mode
        console.log('Supabase error:', err.message);
        
        // Demo mode fallback
        localStorage.setItem('taskpay_logged_in', 'true');
        localStorage.setItem('taskpay_user_email', email);
        
        showSuccess('Demo login successful! Redirecting to dashboard...');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } finally {
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
      }
    });
    
    // Check if already logged in
    if (localStorage.getItem('taskpay_logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
